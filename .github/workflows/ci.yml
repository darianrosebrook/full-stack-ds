name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Validate, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Design tokens — emit composed.tokens.json before contract
      # validation. `generate:check` (next step) loads the composed
      # token graph to verify every contract's `resolvesTo` path, but
      # `composed.tokens.json` is gitignored (regenerable scratch), so
      # it has to be produced fresh in CI. Without this step, every
      # contract reports `token graph not built` DRIFT and the gate
      # fails before any real validation runs.
      - name: Build design tokens
        run: pnpm -F @full-stack-ds/tokens build

      # Contract validation — `generate:check` runs the JSON-Schema shape
      # validator AND the cross-graph semantic checks (every contract
      # resolvesTo path must exist in the composed token graph; emitted
      # CSS must match contract truth; styles selectors don't collide).
      # The bare `generate:validate` only checks shape, which is how a
      # token-graph cleanup landed silently in 2026-05: contracts still
      # referenced `semantic.overlay.scrim.dialog` after the shard was
      # deleted, and the shape validator said VALID. `generate:check` is
      # the real gate.
      - name: Validate contracts (shape + semantic)
        run: pnpm run generate:check

      # Docs-claims drift — asserts `<!-- component-count -->` markers in
      # governed docs match the loader-derived corpus count. Caught the
      # 2026-05 case where prose said 53 components but the corpus was 47.
      - name: Check docs claims (corpus count drift)
        run: pnpm run docs:check-claims

      # Design tokens — DTCG validation. Catches malformed token JSON,
      # self-references, and unknown $type values in source token files
      # before the build composes them.
      - name: Validate design tokens (DTCG)
        run: pnpm run tokens:validate

      # Design tokens — drift gate. Rebuilds composed.tokens.json +
      # tokens.css and fails if the regenerated artifacts differ from
      # what's committed (same shape as the framework-src diff check
      # below, scoped to the tokens output).
      - name: Verify token build is up-to-date
        run: pnpm run tokens:build:check

      # Design tokens — WCAG contrast gate. Loads resolved.tokens.json
      # and checks the curated semantic foreground × background pair
      # list (extractCanonicalPairs in build/w3c/w3c-contrast-validator.ts)
      # against AA in both light and dark themes. Fails if any declared
      # pair drops below its declared level.
      - name: Validate token contrast (WCAG AA)
        run: pnpm run tokens:check-contrast

      # Design tokens — brand-reference verifier. Every `{ref}` inside
      # the 10 brand override files must resolve to an actual token in
      # the composed graph. The token build deliberately skips brand-file
      # ref validation (brand overrides land in a separate cascade layer
      # with a local definedVars set), so `{color.palette.cobalt.500}`
      # would silently no-op at runtime without this gate.
      - name: Validate brand references
        run: pnpm run tokens:check-brand-refs

      # Design tokens — usage regression gate. Fails if any token in the
      # composed graph that was USED at baseline time has become unused,
      # or if total unused count grew. Baseline lives at
      # packages/ds-tokens/usage-baseline.json. To intentionally land a
      # new unused token, re-baseline with
      # `pnpm run tokens:write-usage-baseline` and commit the result.
      - name: Gate token usage regressions
        run: pnpm run tokens:check-usage:gate

      # Full usage report uploaded for visibility into the baseline floor
      # (398 tokens unused at baseline time, mostly data-viz palettes).
      - name: Generate token usage report
        run: pnpm run tokens:check-usage -- --output=tokens-usage-report.md
        continue-on-error: true

      - name: Upload token usage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tokens-usage-report
          path: tokens-usage-report.md
          if-no-files-found: ignore

      - name: Lint
        run: pnpm run lint

      - name: Typecheck (root + codegen)
        run: pnpm run typecheck

      - name: Typecheck (Vue)
        run: pnpm run typecheck:vue

      - name: Test (root)
        run: pnpm test

      - name: Test (Vue)
        run: pnpm run test:vue

      # Governed admission rail
      # (CODEGEN-RAIL-GOVERNED-CI-WIRE-01).
      #
      # Doctrine: required-mode only matters if CI invokes it after
      # generation AND refuses unstaged generated drift. The two
      # steps below encode two distinct proofs:
      #
      #   1. `governed:rail` proves the FULL generated workspace was
      #      regenerated and admitted by required-mode manifest
      #      validation (manifest present, schema v2, all hashes
      #      match, no untracked generated files, framework checks
      #      pass). See packages/ds-codegen/src/validation/required-mode.ts.
      #
      #   2. `git diff --exit-code` over the six generated framework src
      #      trees proves THAT regenerated workspace was already
      #      committed — i.e. the source-of-truth contracts didn't
      #      change without their emitted artifacts also being
      #      updated and committed.
      #
      # Order matters: validate first, then refuse drift. Reversing
      # would let a stale workspace pass the diff check on the way
      # in and only catch the drift after regeneration.
      #
      # `governed:rail` is local-runnable; the `git diff` step is
      # CI-only by design (locally dirty trees are routine during
      # development).
      - name: Governed generated-artifact rail
        run: pnpm run governed:rail

      - name: Generated artifacts are committed
        run: |
          git diff --exit-code -- \
            packages/ds-react/src \
            packages/ds-vue/src \
            packages/ds-svelte/src \
            packages/ds-angular/src \
            packages/ds-lit/src \
            packages/ds-react-native/src

  runtime-rail:
    name: Runtime visual proof rail
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gate
    # Runs after the gate job's pre-flight (validate/typecheck/test) passes.
    # The rail boots the Vite dev server and exercises each of the 5
    # changed components (Progress, Truncate, ShowMore, OTP, Calendar)
    # in a real Chromium under Playwright, asserting contract facts and
    # capturing screenshot baselines. Separates from the gate so that:
    #   - A rail failure (visual regression, dev-server boot issue)
    #     surfaces independently of contract validation.
    #   - The rail's Chromium download doesn't slow the gate job that
    #     also runs `pnpm test` and full typecheck.
    # Pre-push hook does NOT run this rail — too slow for the local
    # push gate; CI is where it earns its keep.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm -F @full-stack-ds/tokens build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # The screenshot describe block self-skips on CI=true (set
      # automatically by GitHub Actions) — committed snapshots are
      # darwin-only, so Linux CI would always write a baseline-missing
      # error on first run. The 20 fact-assertion tests are OS-agnostic
      # and run here. See `test.skip(!!process.env.CI, ...)` in
      # e2e/runtime-rail.spec.ts and the rail's header non-claims.
      - name: Run runtime visual proof rail (fact assertions only)
        run: pnpm run e2e:rail

      # On rail failure, surface the test report + any screenshot diffs
      # so the PR reviewer can see what changed.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-runtime-rail
          path: playwright-report/
          if-no-files-found: ignore

  native-compile-rail:
    name: Native compile rail (Kotlin compile-admission smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # RAIL-NATIVE-COMPILE-LANE-COMPOSE-SMOKE-03. Proves the rail can execute and
    # attribute a NON-pnpm, target-owned compile command — the first non-TS
    # toolchain lane. Smallest stable surface: a pinned JDK + a pinned Kotlin
    # compiler, NO Android emulator, NO runtime UI test. The lane runs two
    # passes: the valid fixture must compile (positive); the invalid `??` fixture
    # must FAIL to compile (negative) — that negative is the standing proof that
    # byte-stability is not compilation. Independent of `gate` (different
    # toolchain), so a JVM-provisioning issue surfaces on its own.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK (pinned)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Provision Kotlin compiler (pinned)
        env:
          KOTLIN_VERSION: 2.0.21
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/kotlinc.zip \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q -o /tmp/kotlinc.zip -d /opt
          /opt/kotlinc/bin/kotlinc -version

      - name: Compile-admission positive (valid Kotlin must compile)
        run: node scripts/run-native-compile-lane.mjs --kotlinc /opt/kotlinc/bin/kotlinc

      - name: Compile-admission negative (invalid `??` Kotlin must fail to compile)
        run: node scripts/run-native-compile-lane.mjs --kotlinc /opt/kotlinc/bin/kotlinc --negative
