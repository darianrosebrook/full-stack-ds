invariants:
  # --- Shared golden data/API template (examples/README.md "Golden data/API template") ---
  - The seam follows the golden template verbatim except for domain and the app-specific decision below; copy invariants 1-9 from examples/README.md.
  - Fixtures are static JSON/JSONL files under examples/social-feed/fixtures, hand-authored, never imported from a package.
  - The adapter (src/data) is the sole layer that touches raw fixture shape; it may load fixtures once into memory and memoize the parsed snapshot; a malformed fixture throws at load time, not as a domain failure.
  - Domain types live in src/types as lane-local app-layer types, not package exports or FSDS contract types.
  - The API (src/api) is promise-returning and resolves a typed ApiResult<T> discriminated union for domain failures; it never throws or rejects for domain failures.
  - Latency and failure are injectable and deterministic (fixed latencyMs default 0; explicit failure flag/option); no wall-clock randomness and no Math.random.
  - src/api/index.ts is the barrel and the sole future-UI consumption boundary; future framework UI imports the barrel only, never src/data or fixtures.
  - Tests under src/**/*.test.ts cover parse, query/read, mutation, typed failure, and at least one falsifiability probe; they run under plain Vitest (node) with latencyMs 0.
  # --- App-specific decision: API is canonical result; UI owns optimistic state + rollback ---
  - The API keeps the ApiResult<T> resolve-don't-reject convention unchanged; a domain failure resolves { ok false, error }.
  - The API represents the canonical async mutation result (what the server would have committed); it has no knowledge of optimistic UI.
  - The future assembly/UI lane owns the optimistic store and rollback via inverse patches or equivalent app-local state (apply optimistically -> await typed result -> settle on ok, roll back on not-ok); rollback machinery is assembly state, not API state.
  - No commit handles / transaction tokens in this first scaffold; the API stays a plain promise-returning surface (no begin/commit/abort, no optimistic-id reconciliation protocol).
  - Rollback (optimistic apply -> API failure -> UI revert) is an assembly-level test for the future framework-lane scaffold, not provable by these API tests alone; the API tests prove only that the failure flag yields the right typed result.
  - Expected API surfaces include listFeed, createPost, addComment, toggleReaction, hidePost, reportPost.
  # --- Slice boundary ---
  - This slice materializes only the social-feed data/API seam; it adds no framework app code (App.tsx/main.tsx/package.json/Vite config), no framework lane folder (react/vue/svelte/angular/lit) content, and no root config/CI changes.
acceptance:
  - id: A1
    given: the social-feed static JSON/JSONL fixtures
    when: the adapter loads and parses them
    then: every fixture row parses into typed records and joins (e.g. posts, comments, authors, the current user) succeed; a malformed fixture throws at load time.
  - id: A2
    given: a constructed feed API over the fixtures
    when: listFeed is called, including under the injectable failure flag
    then: success resolves ok with the feed; the failure flag resolves a typed ApiError (not a thrown/rejected promise); behavior is deterministic with no wall-clock randomness.
  - id: A3
    given: a constructed feed API
    when: createPost and addComment are called
    then: each resolves ok with the committed canonical record (the result the UI reconciles its optimistic state to); state changes are observable on a subsequent read and isolated per API instance.
  - id: A4
    given: a constructed feed API
    when: toggleReaction, hidePost, and reportPost are called
    then: each resolves the canonical mutation result as a typed ApiResult; failures resolve typed ApiError; the API exposes no commit handles or transaction tokens.
  - id: A5
    given: the data/API test suite
    when: a fixture or expectation is deliberately corrupted (falsifiability probe)
    then: the relevant test fails for the right reason, and restoring it returns the suite to green; tests import the API barrel only, never src/data or fixtures.
