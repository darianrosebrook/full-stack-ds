id: SHOWCASE-LIVE-PROP-CONTROLS-01
title: 'Showcase live prop controls over iframe postMessage'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: live-preview-props
created_at: '2026-06-05T22:42:55.225Z'
updated_at: '2026-06-05T22:42:55.225Z'
blast_radius:
  modules:
    - 'src/runtime/ preview harness code: prop parsing, demo builders, iframe host, and per-framework preview plugin tests.'
    - 'src/views/DeveloperView.tsx: developer-surface controls that derive editable props from the contract and dispatch live preview updates.'
    - 'src/styles/app.css: compact control styling for the developer preview panel.'
    - 'e2e/ and src/runtime/*.test.tsx: focused regression coverage for the postMessage prop-update path.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'src/runtime/'
    - 'src/views/DeveloperView.tsx'
    - 'src/styles/app.css'
    - 'src/types/data.ts'
    - 'e2e/'
  out: []
invariants:
  - 'Live prop controls are derived from contract-declared variants and primitive prop member types, not per-component hand-authored control lore.'
  - 'The postMessage API is same-iframe scoped: the parent only sends updates to its own preview iframe, and preview shells ignore malformed or foreign messages.'
  - 'The existing URL/query override path remains intact for the runtime rail; live controls add an interactive showcase path without weakening current non-default rail evidence.'
  - 'Angular remains explicit about its limitation: arbitrary live postMessage prop mutation is admitted only for preview targets whose harness can rerender without AOT recompilation.'
acceptance:
  - id: A1
    given: 'a component with boolean, number, or enum/string variant props'
    when: 'the Developer view renders its live preview'
    then: 'the preview panel exposes appropriate toggles, numeric inputs, or segmented/select controls seeded from the contract defaults'
  - id: A2
    given: 'a React/Vue/Svelte/Lit preview iframe that has posted fsds:ready'
    when: 'a user changes one of the supported prop controls'
    then: 'the parent posts a typed fsds:set-props message and the iframe rerenders the preview with the updated props without a full page navigation'
  - id: A3
    given: 'the existing query-param non-default preview path used by the runtime rail'
    when: 'preview prop helpers and plugins are tested'
    then: 'canonical URL prop encoding/decoding and shell request parsing still behave as before'
  - id: A4
    given: 'the Angular developer preview'
    when: 'live prop controls are rendered'
    then: 'the UI communicates the fixed-fixture limitation by disabling live mutation instead of pretending Angular can accept arbitrary runtime prop sets'
non_functional: {}
contracts:
  - name: 'live-prop-controls'
    type: behavior
    path: 'src/runtime/FrameworkPreview.tsx'
  - name: 'preview-prop-message-api'
    type: api
    path: 'src/runtime/preview-props.ts'
