id: FEAT-MOBILE-RN-001
title: 'React Native emitter completion + default governed-rail graduation'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: rn-rail
created_at: '2026-06-10T02:07:14.228Z'
updated_at: '2026-06-10T02:07:24.157Z'
blast_radius:
  modules:
    - ds-codegen react-native emitter
    - ds-react-native generated package
    - target registry + governed rail + CI/pre-push gates
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-codegen/src/frameworks/react-native/**
    - packages/ds-react-native/**
    - packages/ds-codegen/src/validation/frameworks/react-native.ts
    - packages/ds-codegen/src/ir.ts
    - fsds.targets.json
    - package.json
    - .github/workflows/ci.yml
    - .githooks/pre-push
    - examples/settings/react-native/**
    - docs/current-implementation-snapshot.md
    - docs/successor-work-mobile-rail.md
    - docs/successor-work-mobile-parity-matrix.md
    - scripts/mobile-parity-matrix.mjs
  out: []
invariants:
  - >-
    No per-component lore in the RN emitter: variant/state style realization is
    derived from IR facts (tokenScopes, variants, styledProps, channels), never
    from component-name conditionals.
  - >-
    Web emitter output stays byte-identical: this spec touches ir.ts only to add
    facts; the five web framework trees regenerate unchanged.
  - >-
    Generated RN artifacts remain governed: every emitted file participates in
    the emission manifest and the required-mode verifier; no hand-edited
    generated bytes outside @custom regions.
  - >-
    Graduation never over-claims: knownGaps in the RN validation plan and the
    snapshot ledger are updated in the same change that flips the registry, and
    unproven dimensions (simulator/device execution, visual parity, platform
    a11y parity, native surfaces) stay explicitly non-claimed.
acceptance:
  - id: A1
    given: a contract with a variant axis (e.g. Button variant=primary|destructive) and styles.json declarations
    when: pnpm run generate:react-native emits the component
    then: >-
      the generated .styles.ts contains per-variant style entries fed by the
      typed token scopes, the component body consumes the variant prop to select
      them, and a generated host-render test asserts two variants resolve
      different style values.
  - id: A2
    given: a contract with a value channel (e.g. Tabs value/onValueChange)
    when: the generated RN component is rendered and the trigger is pressed
    then: >-
      uncontrolled state updates via a real setter and the onValueChange
      callback fires, proven by generated react-test-renderer tests.
  - id: A3
    given: a contract with interactive states (disabled/pressed) carrying state styling obligations
    when: the RN component renders under Pressable state
    then: >-
      pressed/disabled style functions realize the declared state styles from
      token scopes (no dead empty style entries for parts that carry
      declarations).
  - id: A4
    given: fsds.targets.json lists react-native as a builtin target
    when: pnpm run governed:rail runs (default rail, --target=all)
    then: >-
      RN artifacts are emitted, verified in required mode, and the RN package
      typecheck + test commands pass as rail rungs; CI and .githooks/pre-push
      include packages/ds-react-native/src in the git-diff drift check.
  - id: A5
    given: the graduation lands
    when: the parity matrix script reruns and docs reconcile
    then: >-
      docs/current-implementation-snapshot.md no longer describes RN as
      experimental opt-in, the parity matrix reflects measured current state,
      and remaining non-claims (surfaces, device execution, visual parity) are
      restated rather than silently dropped.
non_functional: {}
contracts:
  - name: 'rn-variant-style-realization'
    type: behavior
    path: 'packages/ds-react-native/src/components'
  - name: 'rn-rail-graduation'
    type: contract-test
    path: 'fsds.targets.json'
