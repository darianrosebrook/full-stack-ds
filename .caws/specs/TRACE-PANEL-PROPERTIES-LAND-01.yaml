id: TRACE-PANEL-PROPERTIES-LAND-01
title: 'Land the Figma-style PropertiesPanel into TracePanel''s Properties tab; token edits drive DesignView previews live'
risk_tier: 3
mode: feature
lifecycle_state: active
worktree: trace-panel-land
created_at: '2026-06-06T06:18:57.626Z'
updated_at: '2026-06-06T06:19:06.867Z'
blast_radius:
  modules:
    - showcase-app inspector (src/layout/TracePanel, src/app, src/views/DesignView, src/runtime/FrameworkPreview)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - src/layout/TracePanel.tsx
    - src/layout/__tests__/
    - src/app.tsx
    - src/styles/app.css
    - src/views/DesignView.tsx
    - src/views/sections/VariantsMatrix.tsx
    - src/runtime/FrameworkPreview.tsx
    - src/components/properties-panel/
  out: []
invariants:
  - 'The TracePanel Properties tab renders the real PropertiesPanel (variants, properties, box-model, layout, shape, fill, typography, component-tokens) instead of the placeholder copy; the Contract tab and the empty-state (no component) are unchanged.'
  - 'Per-component override state (prop overrides + token overrides) is lifted to App and passed to both the PropertiesPanel (in TracePanel) and DesignView; switching components preserves each component''s edits during a session.'
  - 'Token overrides edited in the Properties tab re-skin DesignView''s live FrameworkPreview cells via injected CSS-custom-property overrides (slot var + resolvesTo semantic var), reusing the proven override mechanism; edits are ephemeral and never written to contracts or disk.'
  - 'The existing baked-props preview pipeline and the generated-artifact admission rail are byte-unchanged; preview override injection is additive.'
acceptance:
  - id: A1
    given: 'a component is selected and the Properties tab is active'
    when: 'the TracePanel Properties tab renders'
    then: 'the full PropertiesPanel is shown (collapsible sections, token-linked controls), not the placeholder text.'
  - id: A2
    given: 'a token value is edited in the Properties tab (e.g. Fill color)'
    when: 'the edit is committed'
    then: 'DesignView''s live preview(s) for that component re-skin to the new value via the injected CSS-var override (proven by an in-browser computed-style assertion), with no module rebuild.'
  - id: A3
    given: 'edits made on one component, then a switch to another component and back'
    when: 'the panel re-renders'
    then: 'each component''s prop/token overrides are preserved for the session (state lifted to App, keyed by component).'
  - id: A4
    given: 'no component is selected'
    when: 'TracePanel renders'
    then: 'the empty-state message is shown and no PropertiesPanel/tabs render (existing behavior preserved).'
non_functional: {}
contracts: []
