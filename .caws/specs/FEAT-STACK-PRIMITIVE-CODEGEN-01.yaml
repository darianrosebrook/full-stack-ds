invariants:
  - 'The Stack primitive contract is the single source for the five web-framework Stack primitives; per-framework Stack source is generated, not hand-authored.'
  - 'Generated Stack primitives are behaviorally identical to the pre-slice hand-authored files (same layout/variant classes, same public prop surface) plus a token-driven gap; no free-form spacing/justify prop is introduced.'
