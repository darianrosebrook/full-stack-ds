id: RAIL-TARGET-SELF-DECLARED-DESCRIPTOR-02
title: 'Move admission-descriptor authorship into each target module; central registry becomes aggregator/validator, no behavior change'
risk_tier: 2
mode: refactor
lifecycle_state: active
worktree: rail-self-declare
created_at: '2026-06-27T01:48:18.604Z'
updated_at: '2026-06-27T01:51:26.292Z'
blast_radius:
  modules:
    - 'packages/ds-codegen/src/validation (descriptor registry + per-framework plan modules)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-codegen/src/validation/admission-descriptor.ts
    - packages/ds-codegen/src/validation/admission-descriptor.test.ts
    - packages/ds-codegen/src/validation/frameworks/react.ts
    - packages/ds-codegen/src/validation/frameworks/vue.ts
    - packages/ds-codegen/src/validation/frameworks/svelte.ts
    - packages/ds-codegen/src/validation/frameworks/lit.ts
    - packages/ds-codegen/src/validation/frameworks/angular.ts
    - packages/ds-codegen/src/validation/frameworks/react-native.ts
    - scripts/rail-toolchain-coupling-audit.mjs
  out:
    # Ownership-migration refactor only. Does NOT touch the four rail consumer
    # modules (they already derive from the registry helpers and stay stable),
    # any emitter, the target registry, the IR, contracts, generated packages,
    # CI, or fsds.targets.json. No native target. No Compose/Gradle. No Figma
    # rail admission. The FrameworkId closed set is unchanged.
    - 'packages/ds-codegen/src/validation/validate-cli.ts'
    - 'packages/ds-codegen/src/validation/required-mode.ts'
    - 'packages/ds-codegen/src/validation/git-range-scope.ts'
    - 'packages/ds-codegen/src/validation/markdown-report.ts'
    - 'packages/ds-codegen/src/validation/types.ts'
    - 'packages/ds-codegen/src/validation/frameworks/figma.ts'
    - 'packages/ds-codegen/src/frameworks'
    - 'packages/ds-codegen/src/target-packs'
    - 'packages/ds-codegen/src/ir.ts'
    - 'packages/ds-codegen/src/emitter.ts'
    - 'packages/ds-codegen/src/registry.ts'
    - 'packages/ds-codegen/src/cli.ts'
    - '.github/workflows'
    - 'fsds.targets.json'
invariants:
  - 'OWNERSHIP MIGRATION, NOT BEHAVIOR CHANGE: each of the six target modules (frameworks/<fw>.ts) exports its own AdmissionDescriptor carrying that target''s facts (outputTreeRelPath, sourceExtensions, reportRank, plan) beside its plan. admission-descriptor.ts no longer authors any per-target metadata inline — it imports the six descriptors and only aggregates, validates (uniqueness/coverage/order), and exposes derived helpers. The derived PLANS_BY_ID / DEFAULT_FRAMEWORKS / COMPONENT_TREES / GENERATED_TREE_PREFIXES / FRAMEWORK_RANK are byte-equivalent to slice-1 output.'
  - 'TARGET SELF-DECLARES; RAIL CORE ADJUDICATES: the durable boundary. A target module is the single authorship site for its own admission facts. The rail core keeps aggregation, uniqueness/coverage/order validation, and all evidence semantics (byte-stability, manifest integrity, provenance binding, report semantics). The rail never re-authors a target''s facts.'
  - 'PLAN IDENTITY PRESERVED: each descriptor still carries the SAME FrameworkValidationPlan object the runner and artifact-join consume. The descriptor wraps the plan; it does not clone or rebuild it. Asserted by toBe identity, not deep-equal.'
  - 'FIGMA STAYS THE EXPLICIT EXCLUSION: frameworks/figma.ts may keep its plan file as the generate-admitted-but-rail-excluded precedent, but it must NOT export an admitted descriptor into the registry and must NOT appear in the admitted set.'
  - 'NO NATIVE TARGET SEMANTICS: jetpack-compose / swiftui appear in no FrameworkId, no descriptor registry, no package script, no CI list, no generated-tree list. The admitted set stays exactly react, vue, svelte, lit, angular, react-native.'
  - 'FRAMEWORKID NOT LOOSENED HERE: the closed FrameworkId literal union stays unchanged this slice. Moving authorship to target modules while the closed rail set is fixed is the disciplined order; widening FrameworkId to registry-derived (or a RailTargetId) is deferred to slice 3.'
  # Non-claims:
  - 'NON-CLAIM: does not change rail behavior, emitted bytes, the manifest schema, or any consumer module.'
  - 'NON-CLAIM: does not add a non-pnpm command, a toolchain, or a CI lane.'
  - 'NON-CLAIM: does not widen the admitted-target set or the FrameworkId union.'
acceptance:
  - id: A1
    given: 'the slice-1 descriptor-derived values (PLANS_BY_ID, DEFAULT_FRAMEWORKS, COMPONENT_TREES, GENERATED_TREE_PREFIXES, FRAMEWORK_RANK)'
    when: 'authorship is moved into the target modules and the registry aggregates them'
    then: 'all five derived values remain byte-equivalent to slice-1 output; the equivalence test (byte-equality vs the pinned legacy literals) still passes unchanged'
  - id: A2
    given: 'the runner and artifact-join consuming a target''s FrameworkValidationPlan'
    when: 'the target now self-declares its descriptor wrapping that plan'
    then: 'the descriptor carries the SAME plan object identity (toBe assertions retained and passing); no plan is cloned or rebuilt in the move'
  - id: A3
    given: 'admission-descriptor.ts after the move'
    when: 'it is read for authored target facts'
    then: 'it contains NO inline per-target outputTreeRelPath, sourceExtensions, reportRank, or plan binding; it imports the six target-declared descriptors and only aggregates them, enforces uniqueness + full FrameworkId coverage + canonical order, and exports the derived helper projections'
  - id: A4
    given: 'frameworks/figma.ts'
    when: 'the registry is assembled'
    then: 'figma may retain its plan file as the rail-excluded precedent but exports no admitted descriptor and does not enter the registry; isAdmittedFrameworkId("figma") stays false'
  - id: A5
    given: 'the admitted target set and FrameworkId union'
    when: 'the diff is inspected'
    then: 'jetpack-compose and swiftui appear in no FrameworkId, descriptor registry, package script, CI list, or generated-tree list; the admitted set is exactly react, vue, svelte, lit, angular, react-native; the FrameworkId union literal is unchanged'
  - id: A6
    given: 'the coupling-audit oracle'
    when: 'it is evolved for this slice'
    then: 'it distinguishes "self-declared descriptor" (authored in a target module) from "central descriptor registry" (aggregator), and FAILS if any target fact (outputTreeRelPath / sourceExtensions / reportRank / inline plan binding) is authored in more than one place or reappears in a consumer module; a large TS-coupled count drop is NOT required — ownership location is the measured property'
  - id: A7
    given: 'the equivalence test as the regression oracle'
    when: 'targeted mutations are applied'
    then: 'the report-rank mutation check (or equivalent) still fails the test as in slice 1, AND mutating one target''s outputTreeRelPath in its module causes the equivalence test to fail — proving the oracle catches drift at the new authorship site, not just the old central one'
non_functional:
  performance:
    - 'The ownership move reorganizes static module-level declarations; it adds no per-artifact or per-run rail cost.'
contracts:
  - name: 'descriptor-ownership'
    type: behavior
  - name: 'self-declared-descriptor'
    type: schema
    path: 'packages/ds-codegen/src/validation/frameworks/react.ts'
