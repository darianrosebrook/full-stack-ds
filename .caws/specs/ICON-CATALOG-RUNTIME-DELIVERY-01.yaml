id: ICON-CATALOG-RUNTIME-DELIVERY-01
title: 'Icon catalog runtime delivery: committed export module + Icon name/size catalog lookup across five frameworks'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-07-09T23:47:45.634Z'
updated_at: '2026-07-09T23:48:45.016Z'
blast_radius:
  modules:
    - 'packages/ds-iconography: build emits committed package-root export module (index.mjs + index.d.ts: named export per icon + catalog + resolver); drift gate; 2-3 new authored icons; ledger covers new outputs.'
    - 'packages/ds-contracts: Icon contract prop surface changes (icon:IconDefinition -> name+size); contract schema gains the icon-glyph render vocabulary.'
    - 'packages/ds-codegen: new IR fact for catalog-driven glyph render; new cross-package import resolver; per-framework lowering in all five component-source.ts; validation/icon-refs.ts semantic check wired into --check-semantics.'
    - 'packages/ds-{react,vue,svelte,angular,lit}/src/components/Icon: regenerated realizations only.'
    - 'src/views/ComponentStandardsView.tsx: showcase consumer updated to the new prop surface.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-iconography'
    - 'packages/ds-contracts/components/Icon'
    - 'packages/ds-contracts/component.contract.schema.json'
    - 'packages/ds-codegen/src'
    - 'packages/ds-react/src/components/Icon'
    - 'packages/ds-vue/src/components/Icon'
    - 'packages/ds-svelte/src/components/Icon'
    - 'packages/ds-angular/src/components/Icon'
    - 'packages/ds-lit/src/components/Icon'
    - 'src/views/ComponentStandardsView.tsx'
  out: []
  support:
    - package.json
invariants:
  - 'Icon glyph data flows source -> committed export module -> runtime lookup: the authoring source stays per-icon icons/<Name>/<Name>.icon.json; the single-sheet export is BUILD OUTPUT, committed at the package root and drift-gated (build + git diff --exit-code), never hand-edited.'
  - 'The gitignored generated/ tree remains scratch: no generated framework package may import from packages/ds-iconography/generated/*; the only cross-package import surface is the committed package-root module.'
  - 'Glyph geometry is generate-time-static per authored size variant, runtime-selected by name: the emitted Icon performs a catalog lookup keyed by the name prop and renders svg[data-fsds-icon=<name>] with the selected variant''s viewBox and paths; no raw-HTML injection (dangerouslySetInnerHTML/v-html/@html/innerHTML) in any emitter lowering.'
  - 'Sizes are first-class authored glyphs: the export shape carries the full size-variant axis per icon; size selection picks an authored variant, never scales a lone render request silently across variants that exist.'
  - 'Icon-name reference integrity is a semantic gate: generate:check fails when a component contract or usage sidecar references an icon name absent from the built catalog (token-resolvesTo analogy), and the failure names the referencing file and the missing name.'
  - 'Emitters carry no per-icon or per-component lore: the catalog lookup lowering is a generic IR fact; no emitter branches on a specific icon or component name.'
acceptance:
  - id: A1
    given: 'the per-icon source corpus and the build'
    when: 'the build runs twice with no source change'
    then: 'the committed index.mjs/index.d.ts are byte-identical across runs and the drift gate (git diff --exit-code on the committed module) passes; changing an icon source then fails the drift gate until rebuilt'
  - id: A2
    given: 'the regenerated Icon component in each of react/vue/svelte/angular/lit'
    when: 'rendered with name="<authored icon>" and a size value'
    then: 'the DOM contains svg[data-fsds-icon="<name>"] with the authored variant''s viewBox and path data, proven by component tests per framework asserting concrete path `d` values, not just element presence'
  - id: A3
    given: 'a component contract or usage sidecar referencing an icon name absent from the catalog'
    when: 'pnpm run generate:check runs'
    then: 'validation fails naming the file and missing icon name; after healing the reference (or authoring the icon) the check passes — proven against Icon.usage.jsonl, whose current check/triangle-alert refs are the live fixture'
  - id: A4
    given: 'the committed export module with named per-icon exports and a catalog export'
    when: 'an esbuild probe bundles (a) a static named-export import of one icon and (b) a dynamic catalog-driven Icon usage'
    then: 'measured bundle byte sizes for both paths are recorded as evidence, quantifying the per-icon cost of the dynamic catalog path (the residual-note test)'
  - id: A5
    given: 'the full regenerated corpus'
    when: 'the emission ledger gate and the committed-bytes checks run'
    then: 'ledger gate passes covering the new committed module, and git diff --exit-code over the five generated Icon trees is clean after regeneration'
non_functional: {}
contracts:
  - name: 'icon-export-module'
    type: schema
    path: 'packages/ds-iconography/index.d.ts'
  - name: 'icon-name-size-lookup'
    type: behavior
    path: 'packages/ds-contracts/components/Icon/Icon.contract.json'
