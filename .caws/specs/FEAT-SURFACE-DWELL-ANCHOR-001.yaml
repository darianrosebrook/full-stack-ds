id: FEAT-SURFACE-DWELL-ANCHOR-001
title: 'Auto-dismiss dwell timing (tokens->contract->logic, all targets) + RN anchored-surface substrate'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-06-10T18:17:17.077Z'
updated_at: '2026-06-10T18:17:31.933Z'
blast_radius:
  modules:
    - motion token graph (dwell subfamily)
    - Toast contract + generated Toast on all six targets
    - behavior primitives (autoDismiss, all five web + RN)
    - RN anchored-surface substrate (Tooltip/Popover)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-tokens/src/motion/**
    - packages/ds-contracts/components/Toast/**
    - packages/ds-contracts/component.contract.schema.json
    - packages/ds-codegen/src/contract.ts
    - packages/ds-codegen/src/ir.ts
    - packages/ds-codegen/src/frameworks/react/hook-source.ts
    - packages/ds-codegen/src/frameworks/vue/**
    - packages/ds-codegen/src/frameworks/svelte/**
    - packages/ds-codegen/src/frameworks/angular/**
    - packages/ds-codegen/src/frameworks/lit/**
    - packages/ds-codegen/src/frameworks/react-native/**
    - packages/ds-codegen/src/validation/frameworks/react-native.ts
    - packages/ds-react/src/primitives/**
    - packages/ds-vue/src/primitives/**
    - packages/ds-svelte/src/primitives/**
    - packages/ds-angular/src/primitives/**
    - packages/ds-lit/src/primitives/**
    - packages/ds-react-native/**
    - docs/presence-surfaces.md
    - docs/current-implementation-snapshot.md
  out: []
invariants:
  - >-
    Contract neutrality: platform divergences (RN Modal hosting for anchored
    content, hover->long-press trigger mapping, web generation-time token
    resolution for timer defaults) live in framework emitters and their docs,
    never in the core contract or schema.
  - >-
    Dwell budgets are motion-family duration tokens consumed by the LOGIC
    layer; no CSS property consumes them. The token flows token graph ->
    component slot -> typed scope (RN, theme-reactive) / generation-resolved
    literal (web hooks).
  - >-
    Behavior-primitive symmetry: the autoDismiss primitive ships in all five
    web framework packages plus RN wiring, with the same options shape
    (open, durationMs, onDismiss, pauseOnInteraction).
  - >-
    WCAG 2.2.1: the timer pauses while the surface is hovered or contains
    focus on web; RN touch behavior documented as residual.
acceptance:
  - id: A1
    given: the motion token graph
    when: dwell tokens land
    then: >-
      core motion.dwell.short/medium/long (4000/6000/8000ms, DTCG duration
      type) and semantic.motion.dwell.notification (-> dwell.medium) build and
      validate; tokens:build and tokens:validate pass.
  - id: A2
    given: the Toast contract
    when: timing declaration lands
    then: >-
      Toast gains a designed duration prop (ms; null disables; undefined =
      token default), a toast.timing.auto-dismiss token slot resolving to
      semantic.motion.dwell.notification, surface.timing.autoDismissProp =
      "duration", and timeout in both dismissal vocabularies; generate:check
      passes.
  - id: A3
    given: the five web framework packages and RN
    when: the autoDismiss behavior primitive lands
    then: >-
      each web package ships the primitive with the shared options shape and
      passing unit tests; the generated Toast hook/composable/controller wires
      it (timer starts when open, clears on close/unmount, pauses on
      hover/focus); RN wires the same logic in the generated component body.
  - id: A4
    given: generated Toast on web and RN
    when: fake-timer tests run
    then: >-
      auto-dismiss fires onOpenChange(false) after the token-resolved default;
      duration null/0 disables the timer; web proves hover-pause defers
      dismissal; RN proves the timer fires through the typed token scope value.
  - id: A5
    given: the Tooltip and Popover contracts (unchanged)
    when: the RN anchored substrate lands
    then: >-
      RN lowers anchored kinds to a trigger Pressable (anchor part) plus a
      transparent Modal hosting content positioned from measureInWindow;
      open triggers lower click->press and hover/focus->long-press
      (documented divergence); dismissal lowers escape->onRequestClose and
      outside-click->backdrop press; generated RN tests prove trigger-press
      opening and backdrop dismissal.
  - id: A6
    given: the full slice
    when: rails and docs reconcile
    then: >-
      governed:rail passes for all seven targets; web generated changes are
      limited to the intended Toast timer wiring; RN knownGaps,
      presence-surfaces status, and the snapshot ledger record what is
      admitted (dwell timing everywhere, RN anchored substrate with its
      modality divergence) and what is not (device execution, true
      non-blocking anchored RN surfaces, pointer-leave on touch).
non_functional: {}
contracts:
  - name: 'dwell-token-flow'
    type: schema
    path: 'packages/ds-tokens/src/motion'
  - name: 'auto-dismiss-primitive'
    type: behavior
    path: 'packages/ds-react/src/primitives'
  - name: 'rn-anchored-substrate'
    type: behavior
    path: 'packages/ds-react-native/src/components'
