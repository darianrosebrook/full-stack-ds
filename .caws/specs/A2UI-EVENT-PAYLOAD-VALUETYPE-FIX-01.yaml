invariants:
  - 'deriveA2UIDescriptor always produces a string (or undefined) for every event entry''s valueType — never an array or object — regardless of whether the source contract''s event.payload is a string or an array of typed members.'
  - 'For an event whose contract payload is an array of {name,type,description} members, the derived valueType is a human-readable string summarizing the member type(s) (e.g. the single member''s type, or a comma-joined list for multiple members).'
  - 'The A2UI Events & channels table renders without throwing for every component in the corpus, including the three (Dialog, Sheet, Tabs) whose events carry array-shaped payloads.'
  - 'Channel-derived events (which already carry a string valueType) are unchanged — no regression to components like Accordion that render correctly today.'
  - 'A2UIDescriptorPanel defensively coerces any non-string valueType to a string at the render boundary, so a future malformed payload degrades to text rather than crashing the page.'
acceptance:
  - id: A1
    given: 'A contract whose events block has an event with an array payload of typed members (e.g. Tabs activeTabChange payload [{name:activeTab,type:number,...}])'
    when: 'deriveA2UIDescriptor(contract) runs'
    then: 'descriptor.events[name].valueType is a string (e.g. "number"), not the raw array/object.'
  - id: A2
    given: 'A contract whose event payload is already a plain string, or whose events derive from channels (e.g. Accordion openness)'
    when: 'deriveA2UIDescriptor(contract) runs'
    then: 'valueType is that string unchanged — existing behavior is preserved.'
  - id: A3
    given: 'The showcase Design view for Tabs (and Dialog and Sheet)'
    when: 'The page renders the A2UI descriptor Events & channels table'
    then: 'The page renders fully with no "Objects are not valid as a React child" crash; the Payload column shows the derived string.'
  - id: A4
    given: 'A hypothetical event whose valueType is (despite the deriver) not a string'
    when: 'A2UIDescriptorPanel renders that row'
    then: 'The cell shows a coerced string and the page does not throw — the render boundary is defensive.'
non_functional: {}
contracts:
  - name: 'a2ui-event-valuetype-string'
    type: behavior
    description: 'deriveA2UIDescriptor must emit a string|undefined valueType for every event, coercing array/object contract payloads into a readable type string. Verified by a unit test over Dialog/Sheet/Tabs plus a string-payload/channel control (Accordion).'
