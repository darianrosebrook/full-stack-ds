invariants:
  - Every component slot that previously resolved to a core.* size/radius/border/type
    token routes through an existing or newly-added semantic role tier; no slot loses
    its token backing or becomes a raw literal as a result of this work.
  - The DTCG token graph stays valid (tokens:validate) and every component resolvesTo
    path stays resolvable (generate:check) after token additions and styles.json rewiring.
  - Generated CSS is regenerated from contracts+codegen (governed:rail green); no
    hand-edited generated bytes; the five web targets stay byte-consistent with source.
  - New semantic color/focus tokens preserve WCAG AA on the curated contrast pairs
    (tokens:check-contrast) and resolve all refs (tokens:check-brand-refs).
acceptance:
  - id: A1
    given: components that currently reach core.* directly for size/radius/border/type
    when: their styles.json is rewired to existing semantic role tiers (semantic.action.size.*, shape.control.*)
    then: their regenerated CSS references the semantic var() chain (not core.*) and generate:check stays green
  - id: A2
    given: a destructive/secondary/outline button whose focus border previously shared semantic.color.border.accent (brand red)
    when: intent-scoped focus tokens are added and routed per-variant
    then: each variant's regenerated :focus-visible border resolves to its own intent focus token, not a single shared brand-red value
  - id: A3
    given: the color.action.* grid covers only primary/secondary/danger with sparse states and interaction.* is an un-scoped neutral gray hover trap
    when: color.action.* is completed for the needed intents/states (or interaction.* is explicitly neutral-scoped)
    then: a brand/intent surface can obtain hover/active/focus/disabled from the semantic layer without borrowing a neutral-gray interaction token, proven by generate:check + a token-resolution assertion
non_functional: {}
