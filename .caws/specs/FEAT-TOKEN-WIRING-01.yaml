id: FEAT-TOKEN-WIRING-01
title: 'Wire new core tokens through semantic + component variants: default-brand dark-accent contrast, 50/900 granularity, elevation/state-layer/badge-size consumption'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: token-wiring
created_at: '2026-06-13T10:05:18.578Z'
updated_at: '2026-06-13T10:05:31.644Z'
blast_radius:
  modules:
    - 'packages/ds-tokens/src (brand default dark-accent; semantic aliases for new 50/900 stops + elevation.surface/stateLayer/badge-size)'
    - 'packages/ds-contracts/components (variant classes consuming the newly-wired semantic tokens)'
    - 'packages/ds-{react,vue,svelte,angular,lit,react-native}/src/components (regenerated)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-tokens/src/
    - packages/ds-tokens/generated/
    - packages/ds-contracts/components/
    - packages/ds-react/src/components/
    - packages/ds-vue/src/components/
    - packages/ds-svelte/src/components/
    - packages/ds-angular/src/components/
    - packages/ds-lit/src/components/
    - packages/ds-react-native/src/components/
    - packages/ds-figma-plugin/src/generated/components/
    - packages/ds-codegen/.emission-manifest.json
    - tmp/
  out: []
invariants:
  - 'The default brand background.accent in dark mode references red.500 (not red.400), so white on-color text on the accent fill (brand mark) clears WCAG AA in dark mode — the brand layer no longer overrides the semantic contrast fix.'
  - 'New core tokens added this session (palette 50/900 stops, elevation.surface.*, interaction.stateLayer.*, glyph.badge.size.*) are reachable: each is either referenced by a semantic alias and consumed by a component, or documented as an intentionally-unconsumed primitive. No orphaned new core token that a variant should be using.'
  - 'tokens:check-contrast passes in light and dark; generate:check passes 47/47 with zero drift after any component regeneration.'
acceptance:
  - id: A1
    given: 'the default brand dark-accent fix'
    when: 'the showcase is loaded in dark mode and the brand-mark contrast is measured'
    then: 'white-on-accent clears WCAG AA (>=4.5:1); Lighthouse color-contrast no longer flags .brand-mark'
  - id: A2
    given: 'the new 50/900 palette stops and other new core tokens'
    when: 'the core->semantic->component wiring is audited'
    then: 'finer-grained semantic aliases consume 50 (subtle tint/hover/border) and 900 (deep text/border/pressed) where components benefit; contrast + generate gates stay green'
non_functional: {}
contracts:
  - name: 'core-semantic-wiring'
    type: behavior
    path: 'packages/ds-tokens/src'
  - name: 'contrast-gate'
    type: contract-test
    path: 'packages/ds-tokens'
