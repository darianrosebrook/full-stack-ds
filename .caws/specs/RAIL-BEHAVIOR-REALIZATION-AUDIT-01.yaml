id: RAIL-BEHAVIOR-REALIZATION-AUDIT-01
title: 'Behavior-realization audit rail: contract-derived obligations for events, compound wiring, and portals'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-07-22T10:30:02.143Z'
updated_at: '2026-07-22T10:30:02.143Z'
blast_radius:
