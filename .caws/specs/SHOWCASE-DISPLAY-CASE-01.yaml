id: SHOWCASE-DISPLAY-CASE-01
title: 'Hidden display-case visual grid for React component variants'
risk_tier: 3
mode: feature
lifecycle_state: active
created_at: '2026-06-13T00:00:00.000Z'
updated_at: '2026-06-13T00:00:00.000Z'
blast_radius:
  modules:
    - 'Showcase app route, display-case view, and app CSS only. No generated component or contract changes.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'src/app.tsx'
    - 'src/router.tsx'
    - 'src/views/DisplayCaseView.tsx'
    - 'src/styles/app.css'
  out:
    - 'packages/ds-contracts/'
    - 'packages/ds-codegen/'
    - 'packages/ds-react/src/components/'
invariants:
  - 'The display-case route is reachable at #/display-case but is not linked from the primary sidebar navigation.'
  - 'The page derives components and variant axes from the existing bundle instead of maintaining a hand-authored component list.'
  - 'The grid is responsive with item tracks at roughly 400px minimum width.'
acceptance:
  - id: A1
    given: 'the showcase app is running'
    when: 'a user opens http://localhost:5173/#/display-case'
    then: 'the app renders a grouped responsive grid of all component contracts'
  - id: A2
    given: 'a component declares styled variants'
    when: 'its display-case tile is rendered'
    then: 'each variant axis/value appears as a live React sample'
  - id: A3
    given: 'the display-case route exists'
    when: 'the main sidebar renders'
    then: 'the route is not linked from navigation'
non_functional: {}
contracts: []
