id: CONTRACT-AXIS-OBLIGATION-VALIDATOR-01
title: 'Cross-axis contract obligation validators (input/form/channel, surface+dismissal focus, A2UI children/anatomy)'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: obligation-axes
created_at: '2026-06-02T08:06:20.211Z'
updated_at: '2026-06-02T08:06:33.292Z'
blast_radius:
  modules:
    - packages/ds-codegen (cross-field semantic validator — new obligation rules + fixtures + tests)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-codegen/src/validation/semantic.ts
    - packages/ds-codegen/src/validation/semantic.test.ts
    - packages/ds-codegen/test/fixtures/obligation-axes
  out:
    - packages/ds-codegen/src/frameworks
    - packages/ds-codegen/src/ir.ts
    - packages/ds-contracts/components
    - packages/ds-react
    - packages/ds-vue
    - packages/ds-svelte
    - packages/ds-angular
    - packages/ds-lit
invariants:
  - 'The new rules extend validateContractSemantics in packages/ds-codegen/src/validation/semantic.ts only. No emitter, IR, generated-package, or real component contract changes — the validator reads contracts, it never rewrites them (the file''s standing doctrinal stance).'
  - 'Zero regression on the real corpus: all 47 component contracts continue to pass `pnpm run generate:check` (no new DRIFT). The three obligation rules are conditional and only fire on genuinely incoherent axis combinations; the real corpus is already coherent (verified pre-implementation: every category:input contract carries form or channels; every category:surface contract that declares dismissal also declares focus; a2ui.children hosts resolve). If a real contract DOES trip a rule, that is a genuine latent incoherence — it is surfaced and reported, NOT silenced by weakening the rule, and fixing it would require a scope amendment (it is out of scope here).'
  - 'Each obligation diagnostic is typed and actionable: it carries a stable code identifying the obligation family (e.g. OBLIGATION_INPUT_NO_DATA_BINDING, OBLIGATION_SURFACE_DISMISSAL_NO_FOCUS_POLICY, OBLIGATION_A2UI_CHILDREN_NO_HOST), a JSON-pointer to the offending field, and a message naming the missing obligation and how to satisfy it — rendered by the existing formatIssues path with no CLI change.'
  - 'Bite is proven by fixtures, not by mutating the real corpus: for each of the three families a FAIL fixture (incoherent) and a PASS fixture (coherent, minimally different) are committed under packages/ds-codegen/test/fixtures/obligation-axes, and the test asserts the rule fires on FAIL and is silent on PASS. A rule that always fires (or never fires) is caught because both polarities are asserted.'
  - 'The R-INPUT rule honors the documented-exception escape hatch from contract-group-axes.md (line 102): category:input without form AND without channels is flagged UNLESS the contract carries a documented display-only reason — so a legitimately display-only input-categorized component is not forced to fabricate a form block.'
  - 'The R-SURFACE rule is conditional on dismissal presence: a surface with NO dismissal contract is never flagged (Card/Blockquote/Postcard stay clean); a surface that CAN be dismissed must declare a focus policy (focus block present) AND an escape/outside-click dismissal trigger — matching contract-group-axes.md line 103.'
  - 'The R-A2UI rule resolves a2ui.children.slot / a2ui.children.accepts hosts against the contract''s real hosting surfaces: the top-level slots map keys, anatomy.parts, and anatomy.details keys. A children policy naming a slot/host that does not exist anywhere in the structural model is flagged (contract-group-axes.md line 105); a children policy with no slot/accepts (just allowed:true) is not flagged.'
acceptance:
  - id: A1
    given: 'a fixture contract with category:input that declares neither a form block nor any channels and carries no documented display-only reason'
    when: 'validateContractSemantics runs (the path generate:check --check-semantics exercises)'
    then: 'it emits one OBLIGATION_INPUT_NO_DATA_BINDING-coded issue pointing at the contract root/category with an actionable message; a sibling PASS fixture identical except for a declared channel (or form, or documented exception) produces no such issue'
  - id: A2
    given: 'a fixture contract with category:surface that declares a dismissal contract (it can be closed) but declares no focus block and/or no escape/outside-click trigger'
    when: 'validateContractSemantics runs'
    then: 'it emits an OBLIGATION_SURFACE_DISMISSAL_NO_FOCUS_POLICY-coded issue at /focus (or /dismissal) naming the missing policy; a sibling PASS fixture that adds focus + an escape/outsideClick trigger produces no such issue; and a third fixture that is a surface with NO dismissal produces no issue (the obligation is conditional)'
  - id: A3
    given: 'a fixture contract whose a2ui.children.slot (or an entry in a2ui.children.accepts) names a host that exists in neither the slots map nor anatomy.parts nor anatomy.details'
    when: 'validateContractSemantics runs'
    then: 'it emits an OBLIGATION_A2UI_CHILDREN_NO_HOST-coded issue at /a2ui/children pointing to the unresolved host; a sibling PASS fixture that declares the matching slot (or anatomy host) produces no such issue'
  - id: A4
    given: 'the real 47-component contract corpus on main'
    when: 'pnpm run generate:check is run after the new rules land'
    then: 'it reports the same pass count as before (47/47, no new DRIFT) — the obligation rules add falsification pressure without flagging any already-coherent real contract; the run output is captured as evidence'
  - id: A5
    given: 'the slice as committed'
    when: 'git diff is taken over the change set'
    then: 'only semantic.ts, semantic.test.ts, and files under packages/ds-codegen/test/fixtures/obligation-axes changed (plus CAWS spec lifecycle); no emitter, ir.ts, generated-package, or real component contract file appears in the diff'
non_functional: {}
contracts:
  - name: 'obligation-diagnostics'
    type: behavior
    path: 'packages/ds-codegen/src/validation/semantic.ts'
