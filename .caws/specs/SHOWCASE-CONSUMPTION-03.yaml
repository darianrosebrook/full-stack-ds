acceptance:
  - id: A1
    given: 'the DS Table contract + codegen'
    when: 'the Table component is regenerated for all five frameworks'
    then: 'TableCell/TableHeaderCell (and TableRow where relevant) accept and forward the cell/header attributes (colSpan, rowSpan, scope, style) needed to express the TokensView token table, with governed:rail green across all targets'
  - id: A2
    given: 'the TokensView token explorer (the one remaining raw <table>)'
    when: 'it renders'
    then: 'it is built from the DS Table compound (no raw <table>/<thead>/<tr>/<th>/<td>), proven by cell-count conservation or equivalent DOM assertions, with the :target row anchoring and the section-header colSpan rows preserved'
  - id: A3
    given: 'src/styles/app.css'
    when: 'it is inspected'
    then: 'it declares no `.chip` rule that collides with DS Chip.css (removed or namespaced, e.g. .tag/.pill or DS Badge), and the affected badges still render correctly'
  - id: A4
    given: 'the consumption guard test'
    when: 'it runs'
    then: 'it fails if a raw data <table> is reintroduced where a DS Table belongs, or if a known DS class collision (.card/.tabs/.chip) reappears in app.css — with a negative control proving the checks bite'
  - id: A5
    given: 'the inherited dirty .claude/hooks/* files'
    when: 'this spec is implemented'
    then: 'they remain untouched and out of scope (enforced via scope.out + protected-paths) unless their owner resets the latch or explicitly authorizes cleanup'
