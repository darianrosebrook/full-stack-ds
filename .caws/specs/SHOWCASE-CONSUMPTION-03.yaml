invariants:
  - 'The DS Table cell/header components forward the HTML attributes real data tables need (colSpan, rowSpan, scope, style) so a consumer is never forced back to raw <table> markup — and the single contract still drives all five framework emitters (no per-framework lore in an emitter).'
