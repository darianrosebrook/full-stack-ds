invariants:
  - 'Coverage must be derived, pins must be fixed points, rails must be wired or deleted. The render-binding rail keeps its corpus-derived model (matrix regenerated from the live contracts dir by scripts/render-binding-audit/audit.mjs each run — never a committed frozen classification) and gains CI wiring so it cannot go silently dead again; its 5-case REGRESSION block stays frozen because regression pins are fixed points, not moving targets.'
  - 'The mobile-parity --check frozen-partition sub-check (sum of a point-in-time A/C/D classification vs the live corpus count) is deleted, not repaired — it encodes a category error (a historical partition can never track a growing corpus without perpetual manual re-classification). The script''s remaining self-checks (dimension completeness, admission symmetry) stay: they assert internal consistency of live-derived output, not frozen citations.'
  - 'The rail run order is generator-then-rail in the same job (the matrix lives in gitignored docs/internal/ by convention); the rail fails loud if the matrix is absent rather than silently passing zero obligations.'
acceptance:
  - id: A1
    given: 'the corrected matrix path and a freshly generated matrix'
    when: 'the render-binding rail runs locally (generator, then playwright spec)'
    then: 'it executes the full corpus-derived obligation sweep with zero failures (skips allowed only for rows the matrix itself classifies as skippable), proving the rail is alive again.'
  - id: A2
    given: 'the rail spec file'
    when: 'the matrix file is absent'
    then: 'the run fails with an explicit missing-matrix error, not a zero-obligation pass.'
  - id: A3
    given: 'CI'
    when: 'the workflow runs'
    then: 'a step regenerates the matrix and runs the render-binding rail; a green CI run now includes render-binding coverage.'
  - id: A4
    given: 'scripts/mobile-parity-matrix.mjs with the frozen-partition sub-check deleted'
    when: 'node scripts/mobile-parity-matrix.mjs --check runs against the live 49-contract corpus'
    then: 'it exits 0, with the remaining self-checks intact and passing.'
  - id: A5
    given: 'the claim ledger'
    when: 'the runtime-rail and mobile-parity rows are read'
    then: 'both reflect the post-fix state (render-binding rail alive + CI-wired; parity --check green with the frozen sub-check retired) — no row still describes the defects as live.'
non_functional: {}
contracts:
  - name: 'render-binding-rail-revival'
    type: behavior
