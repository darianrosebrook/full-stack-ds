id: VARIANT-CLASS-NAMESPACE-COLLISION-01
title: 'Namespace colliding variant-class axes so .prefix--value emission is unambiguous (List/Image as proof cases)'
risk_tier: 3
mode: fix
lifecycle_state: active
worktree: variant-class-namespace
created_at: '2026-06-06T03:57:24.956Z'
updated_at: '2026-06-06T03:57:24.956Z'
blast_radius:
  modules:
    - 'Codegen engine: ir.ts (ClassRecipeIR.valueModifiers gains an optional valuePrefix; buildClassRecipe computes intra-component variant-value collisions and namespaces colliding axes) + test-plan.ts (per-value smoke-test className honors the same namespacing). The five component-source.ts emitters (react/vue/svelte/angular/lit) inject the prefix into the dynamic value-modifier class template — non-colliding axes emit byte-identical output. Plus the variant-style audit (collision detection + namespaced-realization recognition) and its locked discriminator test.'
    - 'Regenerated artifacts confined to the two colliding components (List: variant/marker/spacing/size; Image: size/radius) across react/vue/svelte/angular/lit + figma descriptors. No other component changes (proven by the rail git-diff). No List/Image visual styles are authored.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-codegen/src/'
    - 'packages/ds-react/src/components/List/'
    - 'packages/ds-react/src/components/Image/'
    - 'packages/ds-vue/src/components/List/'
    - 'packages/ds-vue/src/components/Image/'
    - 'packages/ds-svelte/src/components/List/'
    - 'packages/ds-svelte/src/components/Image/'
    - 'packages/ds-angular/src/components/List/'
    - 'packages/ds-angular/src/components/Image/'
    - 'packages/ds-lit/src/components/List/'
    - 'packages/ds-lit/src/components/Image/'
    - 'packages/ds-figma-plugin/src/generated/components/List/'
    - 'packages/ds-figma-plugin/src/generated/components/Image/'
    - 'scripts/variant-style-audit/'
    - 'docs/variant-style-audit/'
  out: []
invariants:
  - 'A variant axis emits the namespaced class shape `.<prefix>--<axis>-<value>` IFF that axis shares at least one value with another variant axis in the same component (a collision); otherwise it keeps the legacy `.<prefix>--<value>` shape. For a colliding axis the bare ambiguous form is REPLACED (not emitted alongside), so no value-collision selector can mis-fire.'
  - 'Non-colliding components regenerate to byte-identical output (valuePrefix is omitted from the IR for them); the only generated bytes that change are List and Image across all five frameworks + figma. This is proven by `governed:rail` regenerate-all + git-diff.'
  - 'No List or Image visual styles (colors/sizes) are authored in this slice. The colliding axes remain UNrealized in the audit after the change (realizedCount stays 0); only the class-addressing substrate and the audit/test tooling change.'
acceptance:
  - id: A1
    given: 'a component contract whose variant axes share one or more values (List.size {sm,md,lg} × List.spacing {none,sm,md,lg} as the locked fixture; Image.size × Image.radius as the second case)'
    when: 'the audit / IR collision pass runs over the contract variants'
    then: 'every value appearing in >=2 axes is reported, and each axis touching such a value is marked tainted (List: variant/marker/spacing/size tainted, as safe; Image: size/radius tainted)'
  - id: A2
    given: 'a tainted (colliding) variant axis'
    when: 'the component template is emitted across react/vue/svelte/angular/lit'
    then: 'the axis emits additive namespaced classes `.<prefix>--<axis>-<value>` (e.g. .list--size-sm and .list--spacing-sm; .image--radius-sm and .image--size-sm); the bare ambiguous `.<prefix>--<value>` is no longer emitted for that axis; non-colliding axes (List.as) and all axes of non-colliding components keep `.<prefix>--<value>` and produce byte-identical output, so no existing selector breaks'
  - id: A3
    given: 'the variant-style audit'
    when: 'it classifies a tainted axis'
    then: 'it recognizes namespaced realization (`.<prefix>--<axis>-<value>`) as the realizing selector for that axis, reports the component-level collisions, and would flag a realization authored against the ambiguous bare form — so a later styling fix cannot introduce an ambiguous selector unnoticed'
  - id: A4
    given: 'List and Image regenerated across react/vue/svelte/angular/lit'
    when: 'the generated component templates and generated smoke tests are inspected'
    then: 'each colliding axis class is unambiguous in every framework (size→`--size-`, spacing→`--spacing-`, marker→`--marker-`, variant→`--variant-`, radius→`--radius-`); the generated lit per-value class-token tests assert the namespaced form and pass; List.as still emits `.list--<as>`'
  - id: A5
    given: 'the locked discriminator test and the audit report'
    when: 'the slice completes'
    then: 'no List/Image visual styling is authored; List/Image colliding axes remain unrealized (realizedCount 0) in the audit; the locked test pins the namespaced emission + collision detection; the next slice can realize List.size/spacing/marker/variant + Image.size/radius safely against the namespaced selectors'
  - id: A6
    given: 'the regenerated artifacts and tooling changes'
    when: 'the gates run'
    then: 'generate:check passes; governed:rail PASSES and its git-diff shows only List+Image (+ codegen/audit/docs) changed; root vitest + all five framework test suites pass (including the regenerated lit smoke tests)'
non_functional: {}
contracts: []
