closure_notes: 'DEFERRED problem-statement record (not abandoned work — ''abandoned'' is the closest CLI resolution for ''closed without implementation''). Captures the Angular non-default-prop constraint (full-tree AOT recompile per prop-set wipes the single shared cache; serve-or-404 middleware, no on-demand compile) and the decision space (per-prop-set cache / fixed fixture set / incremental compiler / explicit non-admission). When the design is chosen, author a FRESH active spec rather than reopening this one. Closed to remove a misleading active-but-unactionable surface; predecessor RUNTIME-RAIL-ANGULAR-01 lands Angular default-props rail facts.'
