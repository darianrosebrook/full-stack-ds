invariants:
  - 'PROBLEM STATEMENT (draft — design not yet chosen). Angular non-default prop facts cannot reuse the R/V/S/L query-param->overrideProps seam. Unlike those frameworks (which bake props into a demo SOURCE STRING at Vite virtual-module load time, with zero compile cost per prop-set), Angular bakes props into a host component that is AOT-compiled BEFORE the browser loads it. compileAngularPackage rm-rf''s a single shared outDir and recompiles the full ~90-file tree (~1.8s) per call, with no incremental/single-file mode and no on-demand-compile path in the preview middleware (it serves-or-404). So each distinct prop-set is a full recompile that wipes any other prop-set''s compiled host.'
  - 'DECISION SPACE (to resolve when this spec is activated): (a) per-prop-set host filenames + per-prop-set cache output dirs + serialized/on-demand compile triggered by the request; (b) a fixed pre-compiled rail fixture set (synthesize the specific non-default rail hosts at startup) — pragmatic but bespoke to current cases; (c) make compileAngularPackage incremental / single-file so per-prop-set recompile is cheap; (d) explicit non-admission — decide the compile cost is unacceptable and keep Angular non-default props out of the rail, documented. The chosen option determines scope and ACs; do not implement before choosing.'
  - 'Predecessor: RUNTIME-RAIL-ANGULAR-01 lands the navigable Angular route + Angular default-props rail facts. This spec extends ONLY to non-default Angular prop facts; it must not regress the default-props coverage that spec establishes.'
acceptance:
  - id: A1
    given: 'the decision-space option chosen at activation (per-prop-set cache / fixed fixture set / incremental compiler / non-admission)'
    when: 'this spec is activated and scoped to that option'
    then: 'the acceptance criteria are rewritten to that option''s concrete, falsifiable shape (e.g. for per-prop-set: a non-default Angular preview compiles and serves the override-baked host without wiping a concurrently-needed prop-set, and the rail asserts the changed Angular fact) — this draft is a tracked problem statement, not an implementation contract'
non_functional: {}
contracts:
