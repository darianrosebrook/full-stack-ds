id: PREPUSH-SCOPED-GATE-01
title: 'Change-scope the pre-push gate (skip unaffected steps; dedup token build; fail-fast order)'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-06-05T05:42:00.796Z'
updated_at: '2026-06-05T05:42:00.796Z'
blast_radius:
  modules:
    - '.githooks/pre-push: the local pre-flight gate — restructured to run only the step-groups whose inputs are in the push diff, dedup the double token build, and fail-fast on lint/typecheck'
    - 'scripts/prepush-scope.mjs: pure changed-files -> step-group classifier the hook calls'
  data_migration: false
operational_rollback_slo: 5m
# DESIGN: CI (.github/workflows/ci.yml) is unchanged and remains the
# AUTHORITATIVE full gate (it additionally runs e2e:rail + chromium and is a
# superset of the local hook). The pre-push hook becomes a *scoped* pre-flight:
# a pure classifier maps the push diff to step-groups; the hook skips groups
# whose inputs are untouched. Conservative by construction — when the range is
# indeterminate (new branch w/o origin/main, or PREPUSH_FULL=1) it runs the
# FULL sequence. It can over-skip relative to CI but never silently skip a step
# whose input changed; CI is the backstop for anything the scoping misses.
scope:
  in:
    - '.githooks/'
    - 'scripts/prepush-scope.mjs'
    - 'scripts/prepush-scope.test.mjs'
  out: []
invariants:
  - 'The scoped gate never skips a step-group whose inputs are present in the push diff: a token change runs the token gates, a contract/codegen/generated change runs generate:check + governed:rail, a JS/TS/Vue/Svelte change runs lint + typecheck, and the rail drift-diff still guards committed generated output.'
  - 'When the push range is indeterminate (no origin/main base, or PREPUSH_FULL=1 is set) the hook runs the FULL original sequence — fail-open to completeness, never fail-open to skipping.'
  - 'CI (.github/workflows/ci.yml) is unchanged and remains the authoritative superset; the local hook is a faster, scoped pre-flight, not a replacement for CI coverage.'
acceptance:
  - id: A1
    given: 'a set of changed file paths'
    when: 'scripts/prepush-scope.mjs classifies them'
    then: 'it emits the correct RUN_* step-group flags (proven by scripts/prepush-scope.test.mjs: docs/scripts-only -> only lint/none; tokens -> token gates + rail; contracts -> generate:check + rail + tests; --full -> all true), deterministically'
  - id: A2
    given: 'the rewritten .githooks/pre-push'
    when: 'a docs/scripts/spec-only push is gated vs a contract-change push'
    then: 'the docs-only push skips token/generate/rail/test groups (seconds, lint-only or none) while the contract push still runs generate:check + governed:rail + the generated-tree drift diff — verified by a dry-run of the hook against both diff shapes'
  - id: A3
    given: 'the token build dependency'
    when: 'the gate runs the token group'
    then: 'tokens are built exactly once (the standalone tokens:build is folded into tokens:build:check, which both emits the composed graph generate:check needs and runs the committed-output drift diff), and lint + typecheck run before the token gates + rail (fail-fast)'
non_functional: {}
contracts:
  - name: 'prepush-scope'
    type: behavior
    path: 'scripts/prepush-scope.test.mjs'
