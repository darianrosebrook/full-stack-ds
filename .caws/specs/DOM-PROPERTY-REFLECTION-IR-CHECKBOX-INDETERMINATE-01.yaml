id: DOM-PROPERTY-REFLECTION-IR-CHECKBOX-INDETERMINATE-01
title: 'DOM-property-only reflection IR for Checkbox indeterminate/aria-checked=mixed'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-06-30T23:16:13.067Z'
updated_at: '2026-06-30T23:21:12.135Z'
