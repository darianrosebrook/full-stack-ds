acceptance:
  - id: A1
    given: 'each of vue svelte angular lit'
    when: 'the package ships its anchored-position primitive mirroring the react options and state semantics including flip-shift collision offset and ready flag'
    then: 'the pure placement and collision computation is unit-tested in that package'
  - id: A2
    given: 'a contract with surface.positioning.strategy anchored'
    when: 'the vue svelte angular lit surface emitters generate the content part'
    then: 'content is fixed-positioned with data-placement and hidden until first measurement in all four frameworks'
  - id: A3
    given: 'the contract also enables portal'
    when: 'the surface opens'
    then: 'each framework moves the content node to document.body via its idiom and the generated tests observe it there'
  - id: A4
    given: 'the behavior-realization audit'
    when: 'obligations are derived from the live corpus'
    then: 'anchored positioning and anchored content-portal obligations exist per framework and the audit plus its self-test pass'
  - id: A5
    given: 'regeneration of all targets'
    when: 'the governed rail and all framework package suites run'
    then: 'they pass with react generated bytes unchanged'
non_functional: {}
