id: FEAT-ALERT-DARK-SOFTEN-01
title: 'Dark-mode fidelity: soften intent subtle dark backgrounds (.800->.900) and restore + enrich per-brand dark identity (design.paths->fsds key migration + brand token enrichment)'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: dark-fidelity
created_at: '2026-06-13T10:41:51.912Z'
updated_at: '2026-06-13T10:44:30.622Z'
blast_radius:
  modules:
    - 'packages/ds-tokens/src/color/semantic (intent subtle dark .800->.900)'
    - 'packages/ds-tokens/src/brands (design.paths.* -> fsds.* key migration so dark blocks emit; per-brand fidelity enrichment)'
    - 'packages/ds-tokens/build/generators (one-off migration/softening scripts; no emitter behavior change)'
    - 'packages/ds-tokens/generated (regenerated tokens.css)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-tokens/src/
    - packages/ds-tokens/build/
    - packages/ds-tokens/generated/
    - packages/ds-codegen/.emission-manifest.json
    - tmp/
  out: []
invariants:
  - 'Intent (info/success/warning/danger) background.*.subtle keeps its light value (palette .100) byte-identical; only the fsds.dark extension moves from palette .800 to .900, so dark-mode intent surfaces read as quiet washes not bold saturated fills. Neutral subtle/disabled/placeholder/readOnly stay at .800 (legitimately subtle grays) and the disabled-foreground AA_LARGE contrast pair stays green.'
  - 'Every brand''s dark-mode color overrides are emitted into generated/tokens.css under a [data-theme="dark"][data-brand="X"] block: the 8 brands that authored dark variants under the unread design.paths.dark key now use fsds.dark, so light != dark for each brand''s accent. check-brand-refs resolves every {ref} in every brand file.'
  - 'tokens:validate, tokens:check-contrast (light + dark, curated pairs), and tokens:check-brand-refs all pass after the change; generate:check passes with zero drift (a pure semantic/brand value shift flows through the tokens.css cascade, so component bytes stay stable).'
acceptance:
  - id: A1
    given: 'the intent subtle dark softening'
    when: 'tokens are rebuilt and background.{info,success,warning,danger}.subtle is resolved in dark mode'
    then: 'each resolves to its palette .900 (e.g. danger #440000, info #001655), light mode still resolves to .100, and check-contrast passes in both themes'
  - id: A2
    given: 'the brand design.paths -> fsds key migration'
    when: 'tokens are rebuilt'
    then: 'generated/tokens.css contains a [data-theme="dark"][data-brand="X"] block for all 11 brands (was 2), and each migrated brand''s dark accent differs from its light accent'
  - id: A3
    given: 'the per-brand enrichment'
    when: 'each brand file is audited and the showcase is loaded per-brand in dark mode'
    then: 'each brand consumes the richer palette stops + new session tokens where it benefits (softer/elevation.surface/stateLayer), maintains AA on its accent fills, and reads as a distinct identity light and dark'
non_functional: {}
contracts:
  - name: 'subtle-dark-softening'
    type: behavior
    path: 'packages/ds-tokens/src/color/semantic/background.tokens.json'
  - name: 'contrast-gate'
    type: contract-test
    path: 'packages/ds-tokens'
