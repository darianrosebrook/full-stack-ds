id: PR10-MERGE-RECONCILIATION-01
title: 'Reconcile PR #10 (feat/codegen-rn-emitter-ir-authority) merge conflicts against main'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-07-01T16:02:55.555Z'
updated_at: '2026-07-01T16:02:55.555Z'
blast_radius:
  modules:
    - ds-codegen
    - ds-contracts
    - ds-react
    - ds-vue
    - ds-svelte
    - ds-angular
    - ds-lit
    - examples
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'examples/README.md'
    - 'packages/ds-contracts/components/Field/Field.contract.json'
    - 'packages/ds-angular/src/components/Field/Field.component.ts'
    - 'packages/ds-lit/src/components/Field/Field.ts'
    - 'packages/ds-react/src/components/Field/Field.tsx'
    - 'packages/ds-svelte/src/components/Field/Field.svelte'
    - 'packages/ds-vue/src/components/Field/Field.vue'
    - 'packages/ds-vue/src/components/index.ts'
    - 'packages/ds-codegen/src/frameworks/vue/component-source.ts'
  out: []
invariants:
  - 'This is conflict RESOLUTION, not new feature work: every hunk is decided on the merits of which side is the more current/complete/correct implementation, never by mechanical ours/theirs preference. Where both sides fixed the same defect independently (e.g. the Vue literal-escaping fix), take the more general/superseding fix and discard the redundant one rather than keeping both.'
  - 'Field contract/generated-output conflicts resolve to origin/main''s named-slot projection shape (commit e8b23a04, "durable composer slot-projection across all six targets"), which supersedes this branch''s content-binding fix (commit 3ea529ae) for the identical defect (double border/duplicate label/empty help+error). The superseded commit is not reintroduced.'
  - 'Purely additive conflicts (new component exports, new README rows/paragraphs added independently by both sides) resolve as a union preserving both additions, not a pick-one-side overwrite that silently drops content.'
  - 'No conflict resolution reopens or contradicts an already-closed spec''s acceptance criteria (e.g. DOM-PROPERTY-REFLECTION-IR-CHECKBOX-INDETERMINATE-01, CODEGEN-RN-EMITTER-IR-AUTHORITY-01). If a resolution would do that, stop and flag it rather than resolving unilaterally.'
acceptance:
  - id: A1
    given: 'a merge of origin/main into feat/codegen-rn-emitter-ir-authority with content conflicts'
    when: 'each conflicted file in scope.in is resolved'
    then: 'no conflict markers (<<<<<<<, =======, >>>>>>>) remain in any file in the repo, verified by a repo-wide grep after resolution.'
  - id: A2
    given: 'the resolved merge'
    when: 'pnpm run generate:check runs'
    then: 'all component contracts pass validation (47/47 or the then-current corpus count), proving the resolved Field contract and any other resolved contract files are still schema-valid.'
  - id: A3
    given: 'the resolved merge'
    when: 'pnpm run governed:rail runs'
    then: 'the rail reports "overall": "pass" with zero fail/error entries, proving the resolved generated Field output (react/vue/svelte/angular/lit) and the resolved Vue emitter still produce admitted, behaviorally-passing artifacts.'
  - id: A4
    given: 'the resolved merge is committed'
    when: 'the merge commit is inspected'
    then: 'the commit message or PR body explains, for each non-trivial conflict, which side was kept and why (superseding fix vs. union vs. mechanical) — not a bare "resolved conflicts" message.'
non_functional: {}
contracts:
  - name: 'merge-conflict-resolution-correctness'
    type: behavior
    description: 'Every resolved conflict preserves the more current/complete implementation on each side (or unions purely-additive changes), proven by generate:check + governed:rail passing on the merged tree, not merely by the merge completing without markers.'
