acceptance:
  - id: A1
    given: 'interactions whose next channel value composes the current value with an event payload or iteration local (OTP char at index, Select membership toggle)'
    when: 'the grammar gains a closed vocabulary of NAMED update operations (no arbitrary expressions, each operation admitted only with a corpus consumer)'
    then: 'contracts declare the operation, the IR normalizes it, and all five web emitters lower it idiomatically, pinned per framework with falsification.'
  - id: A2
    given: 'the OTP field input wire using the set-char-at-index operation'
    when: 'a user types in field N'
    then: 'character N of the value channel updates without overwriting the rest, proven by behavioral tests in at least react plus one other framework.'
  - id: A3
    given: 'Select in multiple mode using the membership-toggle operation'
    when: 'an option is clicked'
    then: 'the selection array adds or removes that options value, single-select replace behavior unchanged, proven behaviorally.'
  - id: A4
    given: 'the behavior-realization audit and both Playwright rails'
    when: 'the feature lands'
    then: 'the audit derives obligations for the new operation form and stays green, and byte-stability holds for components not using the new operations.'
non_functional: {}
