updated_at: '2026-06-06T04:57:56.510Z'
blast_radius:
  modules:
    - 'List + Image contract sidecars (tokens.json + styles.json): author per-value tokens and the consuming variant selectors, then regenerate List + Image across all five frameworks + figma. Realization is authored EXCLUSIVELY through the namespaced selectors landed by VARIANT-CLASS-NAMESPACE-COLLISION-01 (.list--size-*, .list--spacing-*, .list--marker-*, .list--variant-*, .image--size-*, .image--radius-*) — no bare colliding-axis selector is authored.'
    - 'List type/spacing resolve to existing semantic/core tokens (body.0x, core.spacing.size.0x); marker uses list-style-type CSS keywords; variant uses existing list.color.border + list.spacing tokens. Image.radius resolves to semantic.shape.radius.*; Image.size uses component-owned literal tokens (no fitting core dimension scale exists — same pattern as Dialog/Command width literals). Plus the variant-style audit report and its locked discriminator test.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-contracts/components/List/'
    - 'packages/ds-contracts/components/Image/'
    - 'packages/ds-react/src/components/List/'
    - 'packages/ds-react/src/components/Image/'
    - 'packages/ds-vue/src/components/List/'
    - 'packages/ds-vue/src/components/Image/'
