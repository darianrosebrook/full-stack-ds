  out: []
invariants:
  - 'Every realizing selector is the namespaced form (.list--<axis>-<value>, .image--<axis>-<value>); NO bare colliding-axis selector (.list--sm, .list--none, .list--default, .image--sm, .image--full, …) is authored. The audit''s ambiguous-realization check stays empty.'
  - 'List type/spacing + Image.radius resolve to existing semantic/core tokens (no invented design value); List.marker uses list-style-type CSS keywords; Image.size uses component-owned literal tokens because no core dimension scale fits (authorized deviation). A clean generate:check confirms all token refs resolve.'
  - 'After the slice, List.{size,spacing,marker,variant} and Image.{size,radius} are realized (out of confirmed-defect / no longer silently-unrealized) in the audit, and the namespaced-realization detection path is positively exercised. No other component''s classification changes.'
acceptance:
  - id: A1
    given: 'List.size {sm,md,lg}, List.spacing {none,sm,md,lg}, List.marker {…}, List.variant {default,unstyled,inline,divided,spaced}'
    when: 'a variant class is present'
    then: '.list--size-{sm,md,lg} set font-size (body.03/02/01 = 14/16/18); .list--spacing-{none,sm,md,lg} set inter-item spacing via `> li + li` margin-block-start (0/8/12/24, md reuses the existing list.spacing.md token; gap is unusable on a block <ul> without suppressing markers); .list--marker-{none,disc,circle,square,decimal,alpha,roman} set list-style-type; .list--variant-{unstyled,inline,divided,spaced} apply the approved conventional semantics (unstyled=no marker/pad/margin; inline=flex row; divided=1px list.color.border between <li>; spaced=larger <li> margin). default values use the base rule'
  - id: A2
    given: 'Image.size {xs,sm,md,lg,xl,full}, Image.radius {none,sm,md,lg,full}'
    when: 'a variant class is present'
    then: '.image--size-{xs..xl} set width+height from component-owned literal tokens (24/32/48/64/96), full sets width:100%/height:auto; .image--radius-{none,sm,md,lg,full} set border-radius from semantic.shape.radius.{none,small,medium,large,full} (0/4/8/16/9999)'
  - id: A3
    given: 'the regenerated CSS for List and Image'
    when: 'selectors are inspected'
    then: 'only namespaced selectors realize the colliding axes; no bare `.list--<value>` / `.image--<value>` rule exists for any colliding axis value (grep-proven), so a class from one axis can never trigger another axis''s styles'
  - id: A4
    given: 'the variant-style audit'
    when: 'it reclassifies after regeneration'
    then: 'List.{size,spacing,marker,variant} and Image.{size,radius} leave confirmed-defect/silently-unrealized; the audit detects their realization through the namespaced form (tainted-axis detection path positively exercised); the remaining fully-dead set is otherwise stable; the locked test is updated to pin the new realized state'
  - id: A5
    given: 'the regenerated React CSS mounted in a browser'
    when: 'computed styles are read per axis'
    then: 'runtime computed-style proof shows distinct values: List.marker changes list-style-type; List.spacing changes <li> margin-block-start; List.size changes font-size; List.variant changes layout (inline=flex, unstyled list-style=none, divided <li> border, spaced <li> margin); Image.radius changes border-radius; Image.size changes width/height — proving realization, not just selector presence'
  - id: A6
    given: 'the regenerated artifacts'
    when: 'the gates run'
    then: 'generate:check passes; governed:rail PASSES with the git-diff confined to List+Image (+ audit/docs); root vitest + all five framework suites pass'
non_functional: {}
