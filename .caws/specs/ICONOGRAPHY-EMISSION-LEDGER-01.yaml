id: ICONOGRAPHY-EMISSION-LEDGER-01
title: 'Emission evidence ledger: content-addressed drift substrate for generated artifacts'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: emission-ledger
created_at: '2026-07-01T20:56:36.282Z'
updated_at: '2026-07-01T20:56:36.282Z'
blast_radius:
  modules:
    - 'packages/ds-iconography/build/ledger.mjs: target-agnostic emission-evidence ledger core (hashing, rows, dedup join, gate).'
    - 'packages/ds-iconography/build/build.mjs: icon build wired to emit + attest through the ledger.'
    - 'packages/ds-iconography/: committed ledger artifact + gitignored generated scratch.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-iconography'
  out: []
invariants:
  - 'The ledger is a deterministic function of its row set: a no-op regeneration (byte-identical outputs) produces a byte-identical committed ledger and appends zero new join edges.'
  - 'Generated artifact bytes are NOT committed; only the content-addressed evidence ledger (observation->attachment join stream) is committed. generated/ stays gitignored scratch.'
  - 'The gate proves drift by set-membership: every (observation_ref, attachment_ref) edge a fresh regeneration produces MUST be present in the committed ledger; a missing edge is a hard failure naming the exact unit and file.'
  - 'The ledger carries substrate evidence only (input fingerprint, output hash, emission edge) — no trust/taint/allowed-use adjudication and no governance inference. Provenance is known a priori (the contract governs the artifact).'
  - 'Input fingerprints and output refs use repo-relative POSIX paths only — never machine-absolute paths — so the ledger is reproducible across clones.'
acceptance:
  - id: A1
    given: 'a built icon corpus and its committed emission ledger'
    when: 'the icon build is regenerated with no source change'
    then: 'the recomputed ledger is byte-identical to the committed one and the gate reports zero missing edges'
  - id: A2
    given: 'a committed emission ledger'
    when: 'an icon contract source changes and the build regenerates'
    then: 'the gate reports the new (observation->attachment) edges as missing until the ledger is re-attested, then passes'
  - id: A3
    given: 'the same ledger core driven over a component target (one of react/vue/svelte/angular/lit) regenerated into scratch'
    when: 'component artifacts are fed through the target-agnostic ledger core'
    then: 'the core builds a valid ledger + gate verdict for component artifacts without icon-specific code, proving the substrate generalizes'
non_functional: {}
contracts:
  - name: 'emission-evidence-ledger'
    type: schema
    path: 'packages/ds-iconography/build/ledger.mjs'
