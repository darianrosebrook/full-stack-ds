acceptance:
  - id: A1
    given: 'the 7 portal.enabled components (Dialog, Sheet, Toast, Calendar, Command, Select, Walkthrough) whose hooks return renderInPortal that component-source never consumes'
    when: 'each regenerates'
    then: 'the portal-designated subtree actually renders through the portal mechanism per framework, proven by a test asserting the portaled nodes DOM parent is the portal container rather than the inline position.'
  - id: A2
    given: 'Popover and Tooltip already portal correctly via the anchored-surface path'
    when: 'the corpus regenerates'
    then: 'their output is byte-identical and the fix adds no duplicate portal wrapping.'
  - id: A3
    given: 'contract-vs-emitter review per component before wiring'
    when: 'a component computes renderInPortal but portaling it would be wrong (stacking-context or a11y reasons)'
    then: 'the resolution is recorded per component (wire it or remove the dead computation) — no component keeps an orphaned renderInPortal after this spec.'
  - id: A4
    given: 'the full corpus regeneration and test suites'
    when: 'run after the change'
    then: 'only the affected components change, and generate checks, all package suites, root tests, and the governed rail pass.'
