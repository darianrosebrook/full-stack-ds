    - 'packages/ds-codegen/src/validation/git-range-scope.ts'
    - 'packages/ds-codegen/src/validation/markdown-report.ts'
    - 'packages/ds-codegen/src/validation/frameworks'
    - 'packages/ds-contracts'
invariants:
  - 'SECOND HOSTILE COMPILE LANE, NOT TARGET ADMISSION: this slice proves ONE thing — RailTargetId carries a second non-pnpm native compile lane (Swift) without a Kotlin-only special case. It admits no SwiftUI framework target, emits no component, and makes no runtime claim. The smoke package is a hand-authored minimal Swift fixture pair, NOT a generated component package.'
  - 'SAME ABSTRACTION, NO COMPILER-FAMILY BRANCH: the Swift lane lowers through the SAME native compile abstraction as compose-smoke. There is NO `if kotlin` / `if swift` / compiler-family switch in the rail core or the runner. The runner selects the package, compiler executable, and source extension from the target-owned compile-lane.json (declared data), not from a hardcoded family branch. If admitting Swift requires a Swift-specific branch in the runner or rail core, the abstraction is falsified and must be surfaced, not hidden.'
  - 'RAILTARGETID GENERALIZES; FRAMEWORKID UNCHANGED: swift-smoke is added as a NativeLaneId / RailTargetId, NOT a FrameworkId. FrameworkId membership is unchanged (react, vue, svelte, lit, angular, react-native). The single-id `=== "compose-smoke"` checks become set-membership over {compose-smoke, swift-smoke} — the lane REGISTRY grows, which is the correct generalization, not a compiler-family branch.'
  - 'TOOLCHAIN MINIMAL AND ISOLATED: CI provisions the smallest Swift compiler surface (swiftc, no Xcode project, no SwiftPM graph, no simulator, no XCUITest). Because swiftc needs macOS, the Swift lane runs in its OWN macos-* job (native-compile-rail-swift) with cost recorded separately. The existing Kotlin lane (native-compile-rail) stays on ubuntu-latest and must NOT come to depend on macOS.'
  - 'COMPILER-POSITIVE AND COMPILER-NEGATIVE BOTH PROVEN: a valid Swift fixture compiles (lane passes); an invalid-Swift fixture fails with a known syntax/type error (lane passes on the inverted exit). The negative case proves the swiftc toolchain is genuinely active and that compile-admission catches what byte-stability cannot — the same discipline as the Kotlin `??` fixture.'
  - 'AUDIT GETS STRICTER: the coupling audit shows EXACTLY TWO non-TS native compile lanes (compose-smoke and swift-smoke), both non-pnpm, neither a FrameworkId, neither in fsds.targets.json. --check FAILS if the Swift lane uses pnpm, or if swift-smoke leaks into FrameworkId/registry/fsds.targets. Both new guards are falsified (proven to fail for the right reason).'
  # Non-claims:
  - 'NON-CLAIM: admits no SwiftUI framework target; no FrameworkId widening; no fsds.targets.json entry; no Swift component emission; no generated Swift package.'
  - 'NON-CLAIM: no simulator, XCUITest, or SwiftUI runtime claim — runtime evidence is limited to compile.'
  - 'NON-CLAIM: does not change the web/RN admitted rail (PLANS_BY_ID), the four consumer modules, the compose-smoke lane behavior, or any emitted bytes. The compose-smoke compile-lane.json may gain uniform self-declaration fields (compiler/sourceExtension) but its compile semantics are unchanged.'
acceptance:
  - id: A1
    given: 'the NativeLaneId / RailTargetId types and the FrameworkId union'
    when: 'swift-smoke is introduced'
    then: 'swift-smoke is a NativeLaneId (and therefore a RailTargetId) and is NOT a FrameworkId; FrameworkId membership is unchanged; isNativeLaneId(swift-smoke) is true and isAdmittedFrameworkId(swift-smoke) is false; a test pins this'
  - id: A2
    given: 'a new packages/ds-swift-smoke package'
    when: 'it declares target-owned compile facts and two fixtures'
    then: 'it carries a compile-lane.json with railTargetId swift-smoke and the compiler/source facts, a valid Swift source that compiles with swiftc, and an invalid Swift source that FAILS to compile with a known syntax/type error; no SwiftUI emitter, simulator, or runtime code is present'
  - id: A3
    given: 'the native compile lane abstraction and runner'
    when: 'the Swift lane is run'
    then: 'it lowers through the SAME nativeCompileCommand/runner abstraction as compose-smoke with NO `if kotlin`/`if swift`/compiler-family branch; the runner selects package + compiler + source extension from the target-owned compile-lane.json; a test proves the Swift lane lowers to a non-pnpm argv of the runner shape'
  - id: A4
    given: 'CI'
    when: 'the native-compile-rail-swift job runs'
    then: 'it provisions the smallest Swift compiler surface on a macos-* runner (swiftc, no Xcode project, no simulator, no XCUITest), compiles the valid fixture (positive) and proves the invalid fixture fails (negative); it is a SEPARATE job from native-compile-rail; the Kotlin lane job does not depend on macOS; the macOS toolchain cost is recorded'
  - id: A5
    given: 'a valid Swift fixture AND an invalid-Swift fixture'
    when: 'the compile lane runs against each'
    then: 'the valid fixture compiles and the lane passes; the invalid fixture FAILS the compile and the lane passes on the inverted exit (proving swiftc is genuinely active and compile-admission catches what byte-stability cannot); both outcomes are demonstrated with captured compiler output'
  - id: A6
    given: 'the coupling-audit oracle'
    when: 'it is re-run'
    then: 'it shows EXACTLY TWO non-pnpm native compile lanes admitted to the rail (compose-smoke and swift-smoke), both classified non-TS-toolchain-lane; --check FAILS if the Swift lane reintroduces a pnpm command, or if swift-smoke is added to FrameworkId / the descriptor registry / fsds.targets.json; both new guard falsifications are demonstrated'
  - id: A7
    given: 'the runtime-evidence boundary'
    when: 'the lane and its claims are reviewed'
    then: 'evidence is limited to compile success/failure; there is no simulator, XCUITest, or SwiftUI runtime execution or claim; no SwiftUI emitter and no generated Swift output exist; knownGaps records that runtime admission and a SwiftUI emitter are deferred to a later slice'
non_functional:
  performance:
    - 'The Swift native compile lane is a compile-only smoke (swiftc, no Xcode project/SwiftPM graph/simulator), sized to the smallest stable macOS Swift surface to keep CI cost bounded; the macOS-runner provisioning cost is recorded in the closure notes separately from the Kotlin lane.'
contracts:
  - name: 'swift-native-compile-admission'
    type: behavior
  - name: 'rail-target-id-second-lane'
    type: schema
    path: 'packages/ds-codegen/src/validation/types.ts'
