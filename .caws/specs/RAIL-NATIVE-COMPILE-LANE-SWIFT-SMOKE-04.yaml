id: RAIL-NATIVE-COMPILE-LANE-SWIFT-SMOKE-04
title: 'Prove RailTargetId carries a SECOND non-pnpm native compile lane (Swift/swiftc smoke) through the same abstraction — no Kotlin-only special case; no SwiftUI emitter, no simulator, no runtime'
risk_tier: 2
mode: feature
lifecycle_state: active
