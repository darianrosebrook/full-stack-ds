updated_at: '2026-06-27T06:13:52.082Z'
blast_radius:
  modules:
    - 'packages/ds-swift-smoke (new minimal swiftc compile smoke package)'
    - 'packages/ds-codegen/src/validation (second NativeLaneId + family-neutral native-compile-lane)'
    - 'scripts (family-neutral native lane runner + stricter coupling audit)'
    - '.github/workflows (new native-compile-rail-swift macOS CI job)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-swift-smoke
    - packages/ds-codegen/src/validation/types.ts
