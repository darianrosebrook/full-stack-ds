  out:
    # SECOND HOSTILE COMPILE LANE, NOT a SwiftUI target. Proves RailTargetId
    # carries a second non-pnpm compiler family through the SAME abstraction.
    # Does NOT: admit a SwiftUI framework target, widen FrameworkId, register in
    # fsds.targets.json, emit any Swift component, run a simulator/XCUITest, or
    # make any runtime claim. Does NOT touch the emitter, IR, contracts,
    # generated packages, the FrameworkId admitted-rail (PLANS_BY_ID), or the
    # four web/RN rail consumer modules. The Kotlin lane must NOT come to depend
    # on macOS.
    - 'fsds.targets.json'
