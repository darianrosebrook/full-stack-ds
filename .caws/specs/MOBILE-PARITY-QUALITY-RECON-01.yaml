id: MOBILE-PARITY-QUALITY-RECON-01
title: 'Mobile-vs-web target parity quality matrix (measurement only)'
risk_tier: 3
mode: chore
lifecycle_state: active
worktree: mobile-parity
created_at: '2026-06-02T04:30:01.688Z'
updated_at: '2026-06-02T04:30:09.214Z'
blast_radius:
  modules:
    - docs (parity-matrix recon artifact)
    - scripts (reproducible scoring script — read-only over the corpus/codebase)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - docs/successor-work-mobile-parity-matrix.md
    - scripts/mobile-parity-matrix.mjs
  out:
    # Measurement only. This slice does NOT touch any emitter, target registry,
    # rail, IR, contract, or generated package. Those are the very surfaces it
    # MEASURES; editing them here would corrupt the measurement.
    - 'packages/ds-codegen/src/frameworks'
    - 'packages/ds-codegen/src/target-packs'
    - 'packages/ds-codegen/src/validation'
    - 'packages/ds-codegen/src/ir.ts'
    - 'packages/ds-contracts'
    - 'packages/ds-react'
    - 'packages/ds-vue'
    - 'packages/ds-svelte'
    - 'packages/ds-angular'
    - 'packages/ds-lit'
invariants:
  - 'The slice is MEASUREMENT-ONLY: it produces exactly one doc and one script and changes no emitter, target-pack registry, rail plan, IR, contract, or generated package. Net change set is two files.'
  - 'The matrix numbers are MECHANICALLY DERIVED by scripts/mobile-parity-matrix.mjs from the corpus + codebase (component count via the contracts-fs walk, emitter-file presence, target-registry admission, rail-plan presence, generated-package-root presence), not hand-asserted. The script is a pure read-only function of the repo state — no I/O beyond reads, no clock, no randomness — so re-running it reproduces the same matrix.'
  - 'Every qualitative cell that the script cannot derive (e.g. emitter completeness, surface support, native token realization depth) is grounded by a cited evidence anchor: a file path, a commit SHA, or a prior-sweep category from docs/successor-work-mobile-rail-sweep.md (8c19a4d) / docs/successor-work-mobile-collapse-triage.md (7fee739).'
  - 'The doc draws NO parity claim and recommends NO execution lane. It states the measured asymmetry and inventories gaps; the SwiftUI-package-vs-Native-View-IR lane decision is explicitly deferred to a separate later slice.'
  - 'The eight parity dimensions are scored per target for all eight web+native targets (react, vue, svelte, angular, lit | swiftui, react-native, jetpack-compose); the script must not silently omit a target or a dimension — an unmeasurable cell is reported as "unmeasured", never blank.'
  # Non-claims (scope fences):
  - 'NON-CLAIM: does not register any mobile target, widen BuiltinTargetId, or add a target-pack manifest.'
  - 'NON-CLAIM: does not add or modify any rail per-framework admission plan.'
  - 'NON-CLAIM: does not implement, complete, or alter any SwiftUI / React Native / Jetpack Compose emitter.'
  - 'NON-CLAIM: does not begin Native View IR, native token realization, or SurfaceIR substrate-neutrality work — it only MEASURES their absence.'
  - 'NON-CLAIM: does not recommend or start either execution lane (SwiftUI package/admission for the 21 IR-sufficient components, or Native View IR recon for the 17 composite components).'
acceptance:
  - id: A1
    given: 'the 47-component contract corpus and the eight web+native targets (react, vue, svelte, angular, lit, swiftui, react-native, jetpack-compose)'
    when: 'scripts/mobile-parity-matrix.mjs is run'
    then: 'it emits a per-target score across eight dimensions — (1) component coverage, (2) emitter completeness, (3) compile/admission status, (4) token realization, (5) behavior/controller support, (6) surface support, (7) preservation, (8) rail provenance — with every machine-derivable cell computed from the repo and every non-derivable cell marked "unmeasured" with an evidence anchor; no target or dimension is omitted'
  - id: A2
    given: 'the machine-derivable dimensions (component coverage, emitter-file presence, target-registry admission, rail-plan presence, generated-package-root presence)'
    when: 'the script derives them'
    then: 'it does so by walking the corpus/codebase exactly as the authoritative loaders do (component count via the contracts-fs.ts component walk; target admission via the BUILTIN_TARGET_PACKS keys; rail plans via packages/ds-codegen/src/validation/frameworks/*.ts; package roots via packages/ds-*/src existence) — not by reading a hardcoded list, and a regression test or self-check proves the derived component count equals the contracts-fs count (47)'
  - id: A3
    given: 'the prior sweep (8c19a4d: A=21 IR-sufficient, C=17 composite, D=9 runtime/controller) and triage (7fee739: C1/C2/C3/C4) artifacts'
    when: 'the matrix reports component-coverage and the hard-middle/runtime gaps'
    then: 'the relevant cells cite those category counts as their evidence anchor, and the doc reconciles them with the live emitter-surface inventory (swift has swiftui+uikit sub-targets; compose and rn each have an 8-file emitter shape but no registered target, no package root, no rail plan)'
  - id: A4
    given: 'the completed matrix'
    when: 'the doc is read for conclusions'
    then: 'it states the measured asymmetry (web = governed generated system across all five targets; mobile = one native target with narrow high-quality proofs and zero generated package roots / zero registered targets / zero rail plans) and makes NO parity claim and NO lane recommendation — the lane decision is explicitly named as out-of-scope future work'
  - id: A5
    given: 'the slice as committed'
    when: 'git diff is taken over the whole change set'
    then: 'exactly two files changed (docs/successor-work-mobile-parity-matrix.md, scripts/mobile-parity-matrix.mjs); no emitter, registry, rail, IR, contract, or generated-package file appears in the diff'
non_functional:
  performance:
    - 'scripts/mobile-parity-matrix.mjs is a pure read-only function of the repo (filesystem reads only; no clock, no network, no randomness) so the matrix is deterministic and re-runnable.'
contracts: []
