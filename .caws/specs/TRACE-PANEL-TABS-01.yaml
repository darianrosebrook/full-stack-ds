id: TRACE-PANEL-TABS-01
title: 'TracePanel two-tab inspector: Properties + Contract tabs, contract tree moves to Contract tab'
risk_tier: 3
mode: feature
lifecycle_state: closed
resolution: completed
created_at: '2026-06-06T00:31:03.686Z'
updated_at: '2026-06-06T00:54:49.105Z'
blast_radius:
  modules:
    - 'src/layout/TracePanel.tsx (showcase-app right-hand inspector panel)'
    - 'src/styles/app.css (trace panel + tab chrome)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'src/layout/TracePanel.tsx'
    - 'src/styles/app.css'
    - 'src/layout/__tests__/'
  out: []
invariants:
  - 'TracePanel renders exactly two tabs — "Properties" then "Contract" — using the DS Tabs/TabsList/TabsTab/TabsPanel primitives, not bespoke tab markup.'
  - 'The contract tree (JsonTreeViewer + selection chip/path/clear-selection controls) renders only inside the Contract tab panel; the Properties tab panel is intentionally empty (placeholder copy) for this slice.'
  - 'The panel body is a scrollable container that does not push the tab bar out of view: the tab bar stays fixed while the active panel content scrolls.'
  - 'When no component is selected, TracePanel still renders the empty-state message (no tabs), preserving existing behavior.'
  - 'Tab selection is component-local React state and defaults to the Properties tab when a component is opened.'
  - 'No regression to the trace-selection contract: clicking a tagged region on the Developer tab still highlights the contract path and the Clear-selection control still works, now within the Contract tab.'
acceptance:
  - id: A1
    given: 'A component is selected so the right-hand inspector panel is shown'
    when: 'TracePanel renders'
    then: 'A two-tab bar is shown with "Properties" (default-selected) and "Contract"; the static "CONTRACT" heading is gone and the tab bar serves as the panel header.'
  - id: A2
    given: 'A component is selected and the Contract tab is active'
    when: 'The Contract tab panel renders'
    then: 'The contract JSON tree (JsonTreeViewer) and the selection chip / contract-path / Clear-selection controls render inside the Contract panel.'
  - id: A3
    given: 'A component is selected and the Properties tab is active'
    when: 'The Properties tab panel renders'
    then: 'The panel shows placeholder content only (no contract tree), confirming the Properties surface is reserved but intentionally blank for this slice.'
  - id: A4
    given: 'A trace selection exists (a tagged region was clicked on the Developer tab)'
    when: 'The user views the Contract tab and clicks Clear selection'
    then: 'The selection is cleared and the contract tree de-highlights — the existing trace-selection behavior is preserved within the new tab.'
  - id: A5
    given: 'No component is selected'
    when: 'TracePanel renders'
    then: 'The empty-state message ("Select a component to inspect its contract.") is shown and no tab bar is rendered.'
non_functional: {}
