id: RAIL-NATIVE-COMPILE-LANE-COMPOSE-SMOKE-03
title: 'Prove the rail admits a non-pnpm target-owned compile command: minimal Gradle/Kotlin smoke lane + RailTargetId, no Compose target admission'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-06-27T02:05:00.576Z'
updated_at: '2026-06-27T02:05:13.342Z'
blast_radius:
  modules:
    - 'packages/ds-compose-smoke (new minimal Gradle/Kotlin smoke package)'
    - 'packages/ds-codegen/src/validation (RailTargetId + native-compile-lane descriptor)'
    - '.github/workflows (new native-compile-rail CI job)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-compose-smoke
    - packages/ds-codegen/src/validation/types.ts
    - packages/ds-codegen/src/validation/native-compile-lane.ts
    - packages/ds-codegen/src/validation/native-compile-lane.test.ts
    - .github/workflows/ci.yml
    - scripts/rail-toolchain-coupling-audit.mjs
    - scripts/run-native-compile-lane.mjs
  out:
    # Compile-admission proof ONLY. Does NOT admit a Compose framework target,
    # widen FrameworkId, register in fsds.targets.json, emit any component, or
    # claim any runtime/simulator/Robolectric/compose.ui.test behavior. Does NOT
    # touch the emitter, IR, contracts, generated packages, the FrameworkId
    # admitted-rail (PLANS_BY_ID), or the four web/RN rail consumer modules.
    - 'fsds.targets.json'
    - 'packages/ds-codegen/src/frameworks'
    - 'packages/ds-codegen/src/target-packs'
    - 'packages/ds-codegen/src/ir.ts'
    - 'packages/ds-codegen/src/emitter.ts'
    - 'packages/ds-codegen/src/registry.ts'
    - 'packages/ds-codegen/src/validation/admission-descriptor.ts'
    - 'packages/ds-codegen/src/validation/validate-cli.ts'
    - 'packages/ds-codegen/src/validation/required-mode.ts'
    - 'packages/ds-codegen/src/validation/git-range-scope.ts'
    - 'packages/ds-codegen/src/validation/markdown-report.ts'
    - 'packages/ds-codegen/src/validation/frameworks'
    - 'packages/ds-contracts'
  support:
    - 'packages/ds-codegen/__golden__/Switch/Switch.compose.kt'
invariants:
  - 'COMPILE-ADMISSION PROOF, NOT TARGET ADMISSION: this slice proves ONE thing — the rail can execute and attribute a non-pnpm, target-owned compile command under CI. It admits no Compose framework target, emits no component, and makes no runtime claim. The smoke package is a hand-authored minimal Kotlin/Compose fixture, NOT a generated component package.'
  - 'RUNNER UNCHANGED, COMMAND GENERALIZED: the existing spawn-based runner already executes any argv (run-command.ts spawns command[0] with no pnpm assumption). The native lane declares a compile command as a target-owned argv (e.g. ["./gradlew", ":ds-compose-smoke:compileKotlin"] or a wrapper script) that lowers to the same PlanCommand/runner abstraction or a compatible one. The rail core still owns evidence binding (exit-code -> pass/fail, diagnostic capture, attribution).'
  - 'RAILTARGETID INTRODUCED; FRAMEWORKID NARROWED, NOT WIDENED: a new RailTargetId identity is introduced as the broader rail-participant id. FrameworkId stays the (now-explicitly-narrower) admitted web/RN framework set and is NOT widened to include the smoke lane. The smoke lane is a RailTargetId that is NOT a FrameworkId and NOT in the admitted PLANS_BY_ID descriptor registry. Rationale recorded: FrameworkId encodes the web-framework mental model and is semantically wrong for native/design-tool targets; introducing RailTargetId now is cheaper than a later migration.'
  - 'TOOLCHAIN MINIMAL AND PINNED: CI provisions the smallest stable JVM/Compose surface — a pinned JDK (setup-java) and a Gradle wrapper or pinned Gradle, NO Android emulator, NO runtime UI test harness. The lane is a compile, not a run.'
  - 'COMPILER-POSITIVE AND COMPILER-NEGATIVE BOTH PROVEN: a valid Kotlin/Compose fixture compiles (lane passes); an invalid-Kotlin fixture (e.g. the `??` operator from the golden Switch.compose.kt, which is C#/Swift not Kotlin) FAILS the compile lane. The negative case directly discharges the "byte-stability is not compilation" finding — the lane catches what git-diff cannot.'
  - 'NO POLICY LEAK BACK INTO THE RAIL CORE: the native lane carries its own compile command and toolchain facts (target-owned, like slice 2). The rail core gains no Compose-specific or Gradle-specific branch. If admitting the JVM lane requires target-specific policy in validate-cli/required-mode/run-command, that is a falsification of the abstraction and must be surfaced, not hidden.'
  # Non-claims:
  - 'NON-CLAIM: admits no jetpack-compose framework target; no FrameworkId widening; no fsds.targets.json entry; no component emission; no generated Compose package.'
  - 'NON-CLAIM: no runtime/simulator/Robolectric/compose.ui.test/visual claim — runtime evidence is limited to compile.'
  - 'NON-CLAIM: does not change the web/RN admitted rail (PLANS_BY_ID), the four consumer modules, or any emitted bytes.'
acceptance:
  - id: A1
    given: 'the existing spawn-based rail runner and the slice-2 target-owned descriptor pattern'
    when: 'the native compile lane declares a non-pnpm compile command (a Gradle/wrapper argv)'
    then: 'the command lowers to the existing PlanCommand/runner abstraction (or a compatible one) and the rail core executes it and binds evidence (exit-code -> pass/fail, diagnostics captured, attributed to the lane id) without a pnpm assumption; a test proves a non-pnpm argv runs and is attributed'
  - id: A2
    given: 'CI'
    when: 'the native-compile-rail job runs'
    then: 'it provisions the minimum JVM/Gradle toolchain (pinned JDK via setup-java, Gradle wrapper or pinned Gradle), with NO Android emulator and NO runtime UI test step, and compiles the smoke package'
  - id: A3
    given: 'a valid Kotlin/Compose smoke fixture AND an invalid-Kotlin fixture (the `??` operator)'
    when: 'the compile lane runs against each'
    then: 'the valid fixture compiles and the lane passes; the invalid fixture FAILS the compile (proving the toolchain is genuinely active and that compile-admission catches what byte-stability cannot); both outcomes are demonstrated with captured compiler output'
  - id: A4
    given: 'the admitted-target surfaces'
    when: 'the diff is inspected'
    then: 'no fsds.targets.json Compose entry exists, no FrameworkId member is added, no component is emitted, and admission-descriptor.ts / PLANS_BY_ID are unchanged; the smoke lane is not an admitted framework'
  - id: A5
    given: 'the FrameworkId-vs-RailTargetId decision'
    when: 'types.ts is read'
    then: 'RailTargetId is introduced as the broader rail-participant identity with a recorded rationale; FrameworkId remains the narrower admitted web/RN framework set and is unchanged in membership; the smoke lane id is a RailTargetId that is not a FrameworkId'
  - id: A6
    given: 'the coupling-audit oracle'
    when: 'it is re-run'
    then: 'it shows exactly one non-pnpm compile command admitted to the rail (the smoke lane), classified as a non-TS toolchain lane (not TS-coupled), and --check FAILS if the native lane reintroduces a pnpm-only command or if a Compose framework target gets admitted (FrameworkId/registry/fsds.targets drift)'
  - id: A7
    given: 'the runtime-evidence boundary'
    when: 'the lane and its claims are reviewed'
    then: 'evidence is limited to compile success/failure; there is no simulator, Robolectric, or compose.ui.test execution or claim; knownGaps records that runtime admission is deferred to a later slice'
non_functional:
  performance:
    - 'The native compile lane is a compile-only smoke (no emulator, no UI test), sized to the smallest stable JVM/Gradle surface to keep CI cost bounded; the JDK/Gradle provisioning cost is recorded in the closure notes.'
contracts:
  - name: 'non-pnpm-compile-admission'
    type: behavior
  - name: 'rail-target-id'
    type: schema
    path: 'packages/ds-codegen/src/validation/types.ts'
