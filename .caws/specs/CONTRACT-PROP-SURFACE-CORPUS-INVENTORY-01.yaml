id: CONTRACT-PROP-SURFACE-CORPUS-INVENTORY-01
title: 'Prop-surface inventory + advisory certification harness (corpus scoreboard)'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: prop-surface-inventory
created_at: '2026-06-05T07:36:30.396Z'
updated_at: '2026-06-05T07:36:31.426Z'
blast_radius:
  modules:
    - codegen prop-surface inventory scanner (static, read-only)
    - advisory certification harness (corpus scoreboard)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-codegen/src/prop-surface-inventory.ts
    - packages/ds-codegen/src/prop-surface-inventory.test.ts
  out:
    - packages/ds-react/src
    - packages/ds-vue/src
    - packages/ds-svelte/src
    - packages/ds-angular/src
    - packages/ds-lit/src
    - packages/ds-contracts/components
    - .claude/hooks
    - docs
invariants:
  - >-
    Read-only scoreboard: this spec migrates NO component contract and edits no
    emitter, generated tree, or doc. It only adds a static inventory scanner over
    the contract corpus plus an advisory harness.
  - >-
    Advisory-first: the harness fails on INTERNAL INCONSISTENCY (styled authoring
    propType, a member authoring both type and propType, an unresolved propType
    ref, a migrated component still carrying an A2UI legacy-fallback prop), NOT on
    "still on styled" — 46 legacy contracts must pass as legitimately-legacy.
  - >-
    The scanner derives every fact from contract authority (getPropMembers +
    normalizePropType + contract.types), the same path the IR uses — it does not
    introduce a second interpretation of prop types.
  - >-
    Button is and remains the reference migrated component: designed-only,
    propType on every member, zero legacy type, all refs resolve, structured
    A2UI source.
acceptance:
  - id: A1
    given: the prop-surface inventory over the real contract corpus
    when: the scanner runs
    then: >-
      it reports, per component, bucket usage, prop count/names, propType vs
      legacy-type coverage, ref aliases and whether they resolve, enum domains,
      node/icon props, fallback count, A2UI structured-vs-fallback source, and
      migrated status.
  - id: A2
    given: the corpus inventory
    when: the harness asserts internal consistency
    then: >-
      no styled member authors propType; no designed/constrained member authors
      both type and propType; every propType.ref resolves to contract.types.
  - id: A3
    given: the corpus inventory
    when: the harness checks migrated components
    then: >-
      every migrated component has zero A2UI legacy-fallback props (all consumer
      props structured); legacy components legitimately retain fallback{raw} and
      do NOT fail.
  - id: A4
    given: Button (the pilot exemplar)
    when: the harness checks the reference component
    then: >-
      Button is migrated=true, propType coverage = its full prop count, legacy
      type coverage = 0, all refs resolve, A2UI structured-source = true.
  - id: A5
    given: the harness in this first version
    when: the corpus still has 46 unmigrated components
    then: >-
      the suite PASSES (advisory mode) — "still on styled" is reported, not
      failed; the hard corpus gate is the later CERTIFY spec.
non_functional: {}
contracts:
  - name: 'prop-surface-harness'
    type: contract-test
    path: 'packages/ds-codegen/src/prop-surface-inventory.test.ts'
