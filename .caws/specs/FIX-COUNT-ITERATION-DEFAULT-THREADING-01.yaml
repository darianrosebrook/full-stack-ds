id: FIX-COUNT-ITERATION-DEFAULT-THREADING-01
title: 'Thread contract defaults into lit/angular count-iteration lowering (undefined-prop parity with react/vue/svelte)'
risk_tier: 2
mode: fix
lifecycle_state: active
worktree: count-iter-defaults
created_at: '2026-07-22T01:33:09.761Z'
updated_at: '2026-07-22T01:33:09.761Z'
blast_radius:
  modules:
    - 'TODO: list one or more modules this spec touches.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-codegen/src/frameworks/lit/component-source.ts'
    - 'packages/ds-codegen/src/frameworks/angular/component-source.ts'
    - 'packages/ds-codegen/src/frameworks/iteration-bindings.test.ts'
    - 'packages/ds-lit/src/components/OTP/'
    - 'packages/ds-lit/src/components/Calendar/'
    - 'packages/ds-angular/src/components/OTP/'
    - 'packages/ds-angular/src/components/Calendar/'
  out: []
invariants:
  - 'Cross-framework parity rule being restored: a prop explicitly set to undefined resolves to its CONTRACT default in every framework. React/Vue/Svelte already honor this via parameter-default/withDefaults/export-let semantics; lit and angular clobber it — lit''s count-iteration lowering emits `?? 0` (a hardcoded wrong constant, not the contract default) and angular''s `arrayFromCount(undefined)` coerces to 0. The fix threads the iteration-source prop''s contract default into both lowerings; it does NOT invent defaults where the contract declares none (no default declared → existing fallback behavior stands, explicitly).'
  - 'The fix is emitter-level only: no contract edits, no IR shape changes, no react/vue/svelte emitter changes (they are already correct — regen must leave their trees byte-identical). Discovered by RAIL-COVERAGE-DERIVATION-FIX-01''s revived render-binding rail (OTP.disabled rows: lit/angular previews rendered zero fields because the preview shell''s reset-to-undefined semantics exposed the divergence).'
acceptance:
  - id: A1
    given: 'the lit emitter fix'
    when: 'OTP/Calendar regenerate for lit'
    then: 'the count-iteration source lowers with the contract default (e.g. `this.length ?? 6`, `this.daysShown ?? <its default>`), not `?? 0`, verified in the regenerated files.'
  - id: A2
    given: 'the angular emitter fix'
    when: 'OTP/Calendar regenerate for angular'
    then: 'the iteration call site threads the contract default so an undefined input yields the default count, not zero, verified in the regenerated files.'
  - id: A3
    given: 'a codegen unit test in iteration-bindings.test.ts'
    when: 'a count-iteration fixture with a declared default is emitted for lit and angular'
    then: 'the test pins default-threading in both outputs AND is proven non-vacuous by falsification (revert the emitter change, test fails for the right reason, restore).'
  - id: A4
    given: 'the full corpus regeneration'
    when: 'git status is inspected after `pnpm run generate -- --target=all`'
    then: 'only lit/angular OTP+Calendar files changed (react/vue/svelte byte-identical), and generate:check plus the lit/angular package test suites pass.'
non_functional: {}
contracts:
  - name: 'count-iteration-default-parity'
    type: behavior
