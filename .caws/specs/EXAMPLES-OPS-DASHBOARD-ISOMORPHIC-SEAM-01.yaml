invariants:
  - The adapter loads fixtures isomorphically (via bundler module imports), with
    no node-only APIs (no node:fs readFileSync, no node:url fileURLToPath, no
    node:path) on the load path, so the seam runs in both node (Vitest) and the
    browser (Vite).
  - The data and API surface is byte-for-byte behavior-preserving — the exported
    types, the FixtureSnapshot shape, and every method's results are unchanged;
    only the fixture-loading mechanism changes.
  - The 47 examples data/API tests (operations 15 + checkout 16 + feed 16) still
    pass; the operations-api.test.ts behavioral contract is unchanged.
acceptance:
  - id: A1
    given: the isomorphic adapter
    when: 'pnpm run test:examples:data-api runs'
    then: all 47 tests still pass — the adapter change is behavior-preserving.
  - id: A2
    given: the operations-dashboard React lane built against the isomorphic seam
    when: 'the built lane is served (vite preview) and loaded in a browser'
    then: 'the dashboard renders (non-empty root element) with no node-externalization
      runtime error, and the queue/summary/detail regions populate from the API.'
  - id: A3
    given: the adapter source
    when: grepped for node-only specifiers (node:fs, node:url, node:path,
      readFileSync, fileURLToPath)
    then: none remain on the fixture-load path.
non_functional: {}
