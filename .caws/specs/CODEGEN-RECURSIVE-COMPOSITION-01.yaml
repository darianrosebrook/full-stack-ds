invariants:
  - 'A contract part/dom-node carrying componentRef is mutually exclusive with tag: a node declares EITHER a native tag OR a component reference, never both.'
  - 'componentRef resolution is by-reference: the emitter adds a real import for the referenced component and emits a component-instance element (e.g. <Button/>), never an inlined/flattened expansion of the referenced component.'
  - 'Layer ordering is enforced: a contract may only componentRef a component whose layer is lower-or-equal in the ladder primitive(1) < compound(2) < composer(3) < assembly(4). A primitive referencing a compound is rejected at validation time.'
  - 'Generated bytes remain contract-governed and rail-clean: after --target=all regeneration, the governed rail passes in required mode and git diff --exit-code is empty over the five generated src trees.'
  - 'Composition inherits a11y across the boundary: aria wiring declared on a part that becomes a componentRef (e.g. TextField field part aria-describedby/aria-invalid) still reaches the referenced component instance in generated output.'
acceptance:
  - id: A1
    given: 'a contract whose anatomy part declares componentRef: "fsds.<Name>" referencing a lower-or-equal-layer component'
    when: 'the contract is validated and the component is generated for a framework target'
    then: 'the generated component imports the referenced component by relative sibling path and emits it as a component-instance element, with no inline expansion'
  - id: A2
    given: 'a contract whose part declares componentRef referencing a HIGHER-layer component (e.g. a primitive referencing a compound)'
    when: 'the contract is validated'
    then: 'validation fails with a layer-ordering diagnostic and no artifact is emitted'
  - id: A3
    given: 'the three pilot compositions Card->Button (compound->primitive), Field->Label/Input/Text (composer->primitives), TextField->Input (composer->primitive)'
    when: 'generate --target=all is run and the governed rail + framework test suites execute'
    then: 'the rail passes in required mode, git diff --exit-code is empty, and the existing behavioral/framework tests pass across react/vue/svelte/angular/lit'
non_functional: {}
contracts:
  - name: 'componentref-lowering'
    type: behavior
    description: 'A contract part/dom-node declaring componentRef: fsds.<Name> lowers to a by-reference component-instance element with a real import, across all five framework emitters, governed by the layer ladder.'
