acceptance:
  - id: A1
    given: 'the shared predicate in react/hook-source.ts made ancestor-aware via an anatomy.dom walk'
    when: 'it evaluates the real Tabs and Accordion contracts plus a negative case'
    then: 'it returns true for both Tabs (co-located) and Accordion (trigger nested under item) and false for non-region components, pinned by new unit tests on the real contract shapes.'
  - id: A2
    given: 'regenerated Accordion output in all five web frameworks'
    when: 'a consumer toggles an item trigger'
    then: 'the click handler lives on the descendant trigger element, aria-expanded follows the contract binding, and the openness channel updates per its contract-declared semantics, proven by behavioral tests per framework.'
  - id: A3
    given: 'Accordion is disclosure not tab selection'
    when: 'generated Accordion output is inspected'
    then: 'no Tabs-specific ARIA leaks in (no role=tab, tablist, aria-controls tab wiring beyond what the contract declares) and roles derive from the contract, with no component-name special-casing added to any emitter.'
  - id: A4
    given: 'the full corpus regeneration'
    when: 'git status is inspected after regenerating all targets'
    then: 'only Accordion trees change (Tabs and every other component byte-identical), and generate checks, all package suites, root tests, and the governed rail pass.'
non_functional: {}
