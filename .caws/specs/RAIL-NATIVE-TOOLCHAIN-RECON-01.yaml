id: RAIL-NATIVE-TOOLCHAIN-RECON-01
title: 'Admission rail toolchain-polymorphism recon: what is TS-only and how the rail becomes target-extensible (measurement only)'
risk_tier: 3
mode: chore
lifecycle_state: active
worktree: rail-toolchain-recon
created_at: '2026-06-27T00:22:10.536Z'
updated_at: '2026-06-27T00:22:17.966Z'
blast_radius:
  modules:
    - docs (rail-toolchain-coupling recon artifact)
    - scripts (reproducible coupling-audit script — read-only over the rail/CI/codebase)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - docs/successor-work-rail-native-toolchain-recon.md
    - scripts/rail-toolchain-coupling-audit.mjs
  out:
    # Measurement only. This slice does NOT touch the rail, its validation plans,
    # the emitter, the target registry, the IR, contracts, CI workflow, or any
    # generated package. Those are the very surfaces it MEASURES; editing them
    # here would corrupt the measurement AND pre-commit the design before it is
    # reviewed. The polymorphic-rail REFACTOR is a separate later slice.
    - 'packages/ds-codegen/src/validation'
    - 'packages/ds-codegen/src/frameworks'
    - 'packages/ds-codegen/src/target-packs'
    - 'packages/ds-codegen/src/ir.ts'
    - 'packages/ds-codegen/src/emitter.ts'
    - 'packages/ds-codegen/src/registry.ts'
    - 'packages/ds-contracts'
    - '.github/workflows'
    - 'fsds.targets.json'
invariants:
  - 'The slice is MEASUREMENT-AND-DESIGN-ONLY: it produces exactly one doc and one script and changes no rail plan, validation module, emitter, target-pack registry, IR, contract, CI workflow, or generated package. Net change set is two files.'
  - 'The TS-coupling inventory is MECHANICALLY DERIVED by scripts/rail-toolchain-coupling-audit.mjs from the live rail/validation/CI sources (the FrameworkId union, PLANS_BY_ID, DEFAULT_FRAMEWORKS, each validation/frameworks/*.ts plan command argv, COMPONENT_TREES, GENERATED_TREE_PREFIXES, FRAMEWORK_RANK, the CI/pre-push git-diff tree list, and the root package.json typecheck:*/test:* script bodies), not hand-asserted. The script is a pure read-only function of the repo state (filesystem reads only; no clock, no network, no randomness) so re-running it reproduces the same inventory.'
  - 'Every coupling site the script reports is classified into exactly one of three buckets: (1) TS-TOOLCHAIN-COUPLED (assumes tsc/vitest/pnpm-package-script and cannot run against a Kotlin/Swift/Gradle/Xcode target), (2) LANGUAGE-AGNOSTIC (works on any byte output — e.g. git-diff byte-stability, emitter-source provenance hashing), (3) ALREADY-POLYMORPHIC (the PlanCommand argv tuple type, which is structurally toolchain-neutral but conventionally TS-shaped). Each site cites file path + line.'
  - 'The doc proposes the injection seam in terms of the EXISTING emitter factory/DI pattern (createReactNativeEmitter -> FrameworkEmitter bound by id in registry.ts) — i.e. a target supplies its own admission plan/toolchain descriptor that the rail consumes through a stable interface, rather than the rail hardcoding each target idiosyncrasy. It identifies the minimal interface the rail must expose for a target to declare what "admissible" means (compile command, test command, output-tree path, file extensions, provenance source set) and which rail standards remain non-negotiable and centrally enforced (byte-stability, provenance binding, contract<->artifact binding) regardless of target toolchain.'
  - 'The doc draws NO implementation; it recommends a refactor SHAPE and names the follow-on execution slices (rail-interface extraction; per-target toolchain descriptors; CI native-build lane), but writes zero production code and registers zero new target.'
  # Non-claims (scope fences):
  - 'NON-CLAIM: does not refactor the rail, extract any interface, or change any validation plan — it specifies the seam, it does not cut it.'
  - 'NON-CLAIM: does not register jetpack-compose / swiftui / any native target, widen the FrameworkId union, or add a rail plan.'
  - 'NON-CLAIM: does not stand up a Gradle/JVM or Xcode toolchain, add a CI native-build job, or compile any emitted Kotlin/Swift.'
  - 'NON-CLAIM: does not implement, complete, or alter any emitter (Compose, Swift, RN, or web).'
  - 'NON-CLAIM: does not assert which native target goes first; it establishes the toolchain-agnostic rail as the shared prerequisite for all of them.'
acceptance:
  - id: A1
    given: 'the live admission rail (packages/ds-codegen/src/validation/**), the CI workflow (.github/workflows/ci.yml), the pre-push hook (.githooks/pre-push), and the root package.json scripts'
    when: 'scripts/rail-toolchain-coupling-audit.mjs is run'
    then: 'it emits a complete inventory of every rail/CI admission site (FrameworkId union members, PLANS_BY_ID entries, DEFAULT_FRAMEWORKS, each validation plan command argv + scope.extensions, COMPONENT_TREES, GENERATED_TREE_PREFIXES, FRAMEWORK_RANK, the git-diff tree lists, and the typecheck:*/test:* script bodies), each classified TS-TOOLCHAIN-COUPLED | LANGUAGE-AGNOSTIC | ALREADY-POLYMORPHIC with a file:line anchor; no admission site is omitted, and an unclassifiable site is reported as "unclassified" never blank'
  - id: A2
    given: 'the machine-derivable coupling facts (plan command argv prefixes, scope.extensions sets, FrameworkId membership, package.json script bodies)'
    when: 'the script derives them'
    then: 'it does so by reading the live source files exactly as the rail loads them (validation/frameworks/*.ts for plan argv; validation/types.ts for the FrameworkId union; validation/validate-cli.ts for PLANS_BY_ID/DEFAULT_FRAMEWORKS; required-mode.ts for COMPONENT_TREES; ci.yml + pre-push for the diff tree list; root package.json for scripts) — not from a hardcoded copy — and a self-check proves the derived FrameworkId set equals the six rail-admitted members (react, vue, svelte, angular, lit, react-native) and that figma is rail-EXCLUDED despite being generate-admitted'
  - id: A3
    given: 'the classified inventory and the existing emitter factory/DI pattern (FrameworkEmitter bound by id in registry.ts)'
    when: 'the doc proposes the polymorphic-rail seam'
    then: 'it specifies the minimal target-supplied admission descriptor interface (compile command, test command, output-tree path, file extensions, provenance source set) and the centrally-enforced non-negotiable rail standards (byte-stability, codegen-source provenance binding, contract<->artifact binding) that hold regardless of toolchain, mapping each back to the concrete coupling site it would replace, and frames it explicitly as the emitter-style factory/DI inversion the user asked for (target extends what is admissible; rail enforces the agreed standard)'
  - id: A4
    given: 'the recon conclusions'
    when: 'the doc is read for a recommendation'
    then: 'it names the ordered follow-on slices (1: extract the rail admission-descriptor interface from the six existing plans without behavior change; 2: move each target to a self-declared descriptor; 3: add the first non-TS toolchain lane — Compose/Gradle — as the first new descriptor consumer) and states the load-bearing risk (a non-TS target can emit byte-stable invalid source; only a real compiler in the rail closes the gap — evidenced by the wrong-Kotlin bug in __golden__/Switch/Switch.compose.kt line 67 using "??" instead of "?:"), making NO start on any of those slices'
  - id: A5
    given: 'the slice as committed'
    when: 'git diff is taken over the whole change set'
    then: 'exactly two files changed (docs/successor-work-rail-native-toolchain-recon.md, scripts/rail-toolchain-coupling-audit.mjs); no rail, validation, emitter, registry, IR, contract, CI-workflow, or generated-package file appears in the diff'
non_functional:
  performance:
    - 'scripts/rail-toolchain-coupling-audit.mjs is a pure read-only function of the repo (filesystem reads only; no clock, no network, no randomness) so the inventory is deterministic and re-runnable.'
