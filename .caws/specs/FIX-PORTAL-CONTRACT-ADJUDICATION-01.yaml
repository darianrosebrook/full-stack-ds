acceptance:
  - id: A1
    given: 'Command is a genuine modal with no surface block so no IR fact names its portal subtree'
    when: 'the contract gains a centered surface block'
    then: 'React regeneration portals Command root-to-body through the existing portalsRootToBody gate with a DOM-parent test.'
  - id: A2
    given: 'Calendar declares portal.enabled over a static inline grid with no popover mode in its DOM anatomy'
    when: 'the overclaim is removed from the contract'
    then: 'the contract no longer promises portaling it never realizes.'
  - id: A3
    given: 'Select and Walkthrough are anchored surfaces where a naive body portal breaks positioning'
    when: 'each is adjudicated'
    then: 'portal.enabled is either removed or explicitly deferred to the cross-framework portal mechanism feature, recorded in the contract or spec notes.'
