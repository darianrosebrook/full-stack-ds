id: FIX-FIELD-SLOT-PROJECTION-01
title: 'Field composer reshape: named-slot projection for label/control/help/error/validatingIndicator (kills double-border + duplicate-children)'
risk_tier: 2
mode: fix
lifecycle_state: active
created_at: '2026-06-25T03:24:29.563Z'
updated_at: '2026-06-25T03:24:40.025Z'
blast_radius:
  modules:
    - 'Field contract anatomy.dom + slots reshape (named-slot projection) and regenerated Field artifacts across all admitted targets. Showcase Field demo migrated from children to slots. No schema, IR, or emitter changes — the named-slot capability is already built and admitted (Dialog/Sheet/Walkthrough).'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-contracts/components/Field/
    - packages/ds-react/src/components/Field/
    - packages/ds-vue/src/components/Field/
    - packages/ds-svelte/src/components/Field/
    - packages/ds-angular/src/components/Field/
    - packages/ds-lit/src/components/Field/
    - packages/ds-react-native/src/components/Field/
    - packages/ds-figma-plugin/src/generated/components/Field/
    - packages/ds-codegen/.emission-manifest.json
    - src/views/DisplayCaseView.tsx
    - tmp/
  out: []
invariants:
  - 'Field anatomy.dom routes each region (label, control, help, error, validatingIndicator) to a distinct named slot ({tag:"slot", name:X}); the default {tag:"children"} hole is never used more than once.'
  - 'The reshape is contract-only: no edits to ds-codegen IR or emitters. Named-slot emission is the existing admitted capability proven by Dialog/Sheet/Walkthrough.'
  - 'All five admitted frameworks regenerate identically from the reshaped contract; no hand-edited generated component bodies (changes flow from the contract through codegen).'
  - 'A11y ID/aria-describedby context propagation (the relationships block) is OUT of scope for this slice and is tracked as Layer-3 follow-up; this fix neither adds nor removes that wiring.'
acceptance:
  - id: A1
    given: 'the reshaped Field.contract.json anatomy.dom'
    when: 'generate runs for Field across all targets'
    then: 'each of label/control/help/error/validatingIndicator renders into its own named slot, and the same children no longer renders in two places (no duplicate label)'
  - id: A2
    given: 'a Field hosting an Input in its control slot'
    when: 'the generated Field is rendered (React/Vue/Svelte/Angular/Lit)'
    then: 'exactly one bordered input box is present — the field__control wrapper no longer draws a second concentric border around the whole field'
  - id: A3
    given: 'a Field given helpText/error/validating'
    when: 'the generated Field is rendered'
    then: 'the help/error/validatingIndicator regions render their slotted content instead of empty spans'
  - id: A4
    given: 'the reshaped corpus'
    when: 'generate:check, generate:validate-usage, governed:rail, and Field behavior tests run'
    then: 'contract/usage references are valid, the rail passes (overall=pass), and Field tests stay green'
non_functional: {}
contracts:
  - name: 'field-anatomy'
    type: schema
    path: 'packages/ds-contracts/components/Field/Field.contract.json'
