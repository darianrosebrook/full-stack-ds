invariants:
  - 'The framework-neutral IR exposes token facts as typed data (path, category, value, provenance), not as CSS declaration strings a consumer must regex.'
  - 'Web framework generated output (React/Vue/Svelte/Angular/Lit) is byte-stable across this change; the additive IR surface does not alter existing emitter output.'
  - 'Token projection branches only on token type/category/path/source — never on component name, framework name, or file path.'
  - 'No emitter reads token values by parsing ir.cssBlocks declaration strings once the typed surface exists.'
  # Non-claims (scope fences — successor specs own these):
  - 'NON-CLAIM: does not make any mobile target rail-admissible (no TargetId widening / target-pack / rail plan — successor FEAT-MOBILE-SWIFTUI-001).'
  - 'NON-CLAIM: does not solve Native View IR layout for category-C composite components (successor Phase 1 layout specs).'
  - 'NON-CLAIM: does not add the native-disclosure collapse intent or any collapsibleTo (successor Phase 0.3 collapse-intent spec).'
  - 'NON-CLAIM: does not implement ShowMore partial collapse or any C2/C3 disposition from TRIAGE-01.'
  - 'NON-CLAIM: does not edit any component contract — token/style sidecars are read-only inputs here.'
acceptance:
  - id: A1
    given: 'a contract with token/style sidecars (e.g. Switch) is built into ComponentIR'
    when: 'a consumer reads the typed token projection from the IR'
    then: 'it obtains each token''s path/name, category/type, semantic alias (when present), raw value (when available), and source provenance — with no CSS parsing'
  - id: A2
    given: 'the SwiftUI emitter needs a size/spacing value (today via findSizeToken regex over cssBlocks)'
    when: 'the typed token surface is available'
    then: 'the emitter obtains the value from the typed IR facts, and a regression test asserts the value is driven by typed facts, not by regex over cssBlocks'
  - id: A3
    given: 'the full corpus is regenerated for all five web targets'
    when: 'the generate + golden/diff check runs (pnpm run generate -- --target=all; git diff over the five src trees)'
    then: 'no web output bytes change (the IR addition is non-observable to web emitters)'
  - id: A4
    given: 'the token projection code'
    when: 'it is inspected / linted for component-name lore'
    then: 'it contains no component-name, framework-name, or file-path string literals driving token decisions (only token type/category/path/source)'
  - id: A5
    given: 'Switch (already-collapsed native primitive) and Details (next planned C1 candidate)'
    when: 'a native-facing test consumes the typed token facts for each'
    then: 'the test proves the token data is AVAILABLE and correctly typed for a native consumer — without completing the mobile emitters or asserting final rendering'
non_functional:
  performance:
    - 'Token projection is a pure function of the contract + sidecars (no I/O, no clock, no randomness) so regeneration stays deterministic.'
contracts:
  - type: schema
    name: 'ComponentIR typed token projection'
    description: >-
      A substrate-neutral token-fact surface on ComponentIR, derived from
      contract token/style sidecars and existing class/style normalization.
      Each fact preserves token path/name, category/type, semantic alias (when
      present), raw value (when available), and source provenance. Native
      emitters read this instead of parsing cssBlocks. Universal Phase 0.2
      blocker per SWEEP-01 (commit 8c19a4d): tokenDep true for 47/47.
      Replaces the SwiftUI findSizeToken CSS-string-mining hack. Evidence:
      docs/successor-work-mobile-rail-sweep.md (8c19a4d),
      docs/successor-work-mobile-collapse-triage.md (7fee739).
  - type: contract-test
    name: 'Typed-token availability for native consumers (Switch, Details)'
    description: >-
      A native-facing test proves the typed token facts are available and
      correctly typed for Switch (already-collapsed native primitive) and
      Details (next planned C1 candidate), WITHOUT completing the mobile
      emitters or asserting final rendering. Proves data availability only.
