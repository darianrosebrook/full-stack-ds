id: CODEGEN-PROP-TYPE-IR-PILOT-01
title: 'Structured PropTypeIR pilot for Button + A2UI projection source'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-06-05T04:09:39.603Z'
updated_at: '2026-06-05T04:09:41.609Z'
blast_radius:
  modules:
    - contract schema (prop buckets + structured propType)
    - codegen IR (PropTypeIR normalization) + prop sourcing
    - all five Web DOM emitters (prop-type lowering)
    - A2UI derivation (structured-type source)
    - Button contract (lone migrated exemplar)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-contracts/component.contract.schema.json
    - packages/ds-contracts/components/Button/Button.contract.json
    - packages/ds-codegen/src/contract.ts
    - packages/ds-codegen/src/ir.ts
    - packages/ds-codegen/src/frameworks/react/component-source.ts
    - packages/ds-codegen/src/frameworks/vue/component-source.ts
    - packages/ds-codegen/src/frameworks/svelte/component-source.ts
    - packages/ds-codegen/src/frameworks/angular/component-source.ts
    - packages/ds-codegen/src/frameworks/lit/component-source.ts
    - packages/ds-contracts/a2ui/derive.ts
    - packages/ds-contracts/a2ui/types.ts
    - packages/ds-codegen/src/prop-type-ir.test.ts
    - packages/ds-contracts/a2ui/__tests__/prop-type-source.test.ts
  out:
    - packages/ds-react/src
    - packages/ds-vue/src
    - packages/ds-svelte/src
    - packages/ds-angular/src
    - packages/ds-lit/src
    - .claude/hooks
    - docs
    - e2e
invariants:
  - >-
    PropTypeIR V1 vocabulary is exactly six kinds: string, number, boolean,
    enum{values}, node{of?: content|icon}, ref{to}. No anonymous unions, literal
    unions beyond enum, arrays, objects, functions, dates, or event objects are
    modeled in this pilot.
  - >-
    Any prop type shape outside V1 lowers through the existing legacy TS-string
    parser as an explicit FALLBACK (or is residualized) — never silently treated
    as a neutral PropTypeIR.
  - >-
    Non-breaking union: codegen sources props from designed + constrained +
    styled. New designed/constrained members author `propType`; legacy `styled`
    members keep `type` (TS string) as their source. The IR normalizes BOTH into
    PropTypeIR.
  - >-
    Codegen-authority rule holds: contract semantics stay upstream, the IR owns
    PropTypeIR (the framework-neutral fact), and emitters only LOWER it into
    target syntax — emitters never re-parse raw contract `type` strings for
    migrated props.
  - >-
    Zero generated-byte drift: the migration produces byte-identical output
    across all five generated framework packages (Button and every other
    component).
  - >-
    Scope discipline: exactly one contract (Button) migrates; this pilot adds NO
    constraint projection (the A2UI constrained-prop projection #1+#3 remains a
    separate successor slice). The constrained bucket is only wired for reading,
    proven by fixture, with no real constrained prop authored.
acceptance:
  - id: A1
    given: Button migrated from styled (TS-string types) to designed
      (structured propType — size/variant/type as ref, booleans, strings)
    when: '`pnpm run governed:rail` regenerates all targets'
    then: >-
      `git diff --exit-code -- packages/ds-react/src packages/ds-vue/src
      packages/ds-svelte/src packages/ds-angular/src packages/ds-lit/src` is
      clean — Button's generated bytes are identical before/after across all five
      frameworks (e.g. React still emits `size?: ButtonSize`, not an inlined
      union).
  - id: A2
    given: a component still authored in the legacy styled bucket (any
      non-Button component)
    when: codegen regenerates it
    then: >-
      it generates correctly via the legacy styled.type -> PropTypeIR fallback
      with no drift; the union read does not require migration.
  - id: A3
    given: a prop whose PropTypeIR is structured (authored propType)
    when: each of the five emitters lowers it
    then: >-
      the emitter lowers from PropTypeIR and does NOT call the raw TS-string
      type parser on the authored input (asserted per framework in
      prop-type-ir.test.ts).
  - id: A4
    given: a designed/constrained member carrying a structured propType
    when: deriveA2UIDescriptor runs
    then: >-
      A2UI derives the accepted value kind from the structured type
      (enum -> enum+values, boolean -> boolean, node{of:icon} -> icon-ref,
      etc.), falling back to TS-string parsing only for legacy styled members.
  - id: A5
    given: a prop type shape outside the V1 vocabulary
    when: it is normalized
    then: >-
      it is marked explicitly as fallback-derived or residual (observable in a
      test), never silently reported as a clean neutral PropTypeIR.
non_functional: {}
contracts:
  - name: 'proptypeir-emitter-lowering'
    type: contract-test
    path: 'packages/ds-codegen/src/prop-type-ir.test.ts'
  - name: 'a2ui-structured-source'
    type: contract-test
    path: 'packages/ds-contracts/a2ui/__tests__/prop-type-source.test.ts'
