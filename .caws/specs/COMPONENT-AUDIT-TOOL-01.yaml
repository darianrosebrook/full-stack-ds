id: COMPONENT-AUDIT-TOOL-01
title: 'Reusable component box-model/sizing/token + rendered-geometry drift audit (CSV review log)'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-06-05T04:12:45.058Z'
updated_at: '2026-06-05T04:12:45.058Z'
blast_radius:
  modules:
    - 'scripts/component-audit/: new standalone Node + Playwright audit harness (read-only over the contract corpus + generated CSS; renders via the existing /preview/react/<Name> dev-server route for geometry)'
    - 'docs/component-audit/: committed CSV review log (one row per component) + README on how to re-run and read drift'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'scripts/component-audit/'
    - 'docs/component-audit/'
  out: []
invariants:
  - 'The audit is READ-ONLY over the source of truth: it reads component contracts, sidecars, and generated CSS, and renders components via the dev-server preview route, but mutates no contract, sidecar, generated artifact, or token file. Its only writes are under scripts/component-audit/ and docs/component-audit/.'
  - 'It is a reusable, occasionally-run drift tool, NOT a CI/pre-push gate. It is never wired into .github/workflows or .githooks, and a non-zero verdict never blocks a build.'
  - 'Expectation is derived from the contract (styles.json literal/resolvesTo + tokens.json box-model overrides + BoxModel primitive defaults); reality is the generated CSS plus the rendered computed geometry. A row''s verdict reflects a real expected-vs-actual comparison, never a hardcoded pass.'
acceptance:
  - id: A1
    given: 'the 47-component contract corpus + generated React CSS'
    when: 'the static audit runs for a batch (or all) of components'
    then: 'it emits one CSV row per component capturing box-model (expected slots vs emitted), sizing (size tokens vs resolved fallbacks), and token-usage (tokenized vs literal, flagged dimensional literals) with a per-dimension verdict, deterministically (same tree -> same rows)'
  - id: A2
    given: 'the dev server serving /preview/react/<Name>'
    when: 'the rendered-geometry probe runs for a batch'
    then: 'it navigates each component''s isolated preview, reads the root computed height/padding/gap/display + bounding rect, and records expected-vs-actual geometry + a verdict in the same CSV row — catching a broken token chain or cascade override that static comparison alone would miss'
  - id: A3
    given: 'a previously-written CSV and a re-run on a changed tree'
    when: 'the audit re-runs'
    then: 'it preserves the human "reviewed" column across runs and reports which rows drifted since the last run (added/removed/verdict-changed), so the tool surfaces drift on occasional re-runs; a negative control proves an injected expectation/reality mismatch flips the relevant verdict'
non_functional: {}
contracts: []
