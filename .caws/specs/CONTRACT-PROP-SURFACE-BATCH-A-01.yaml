invariants:
  - 'Authority split preserved: contracts declare prop semantics, IR normalizes, emitters lower PropTypeIR, the rail validates generated artifacts. No component-name branches added to emitters; no generated files hand-edited. (One generic gap discovered — Lit attribute reflection for callback propType — was promoted to a shared codegen fix, not patched per-component.)'
  - 'Generated framework bytes (ds-react/vue/svelte/angular/lit src) are unchanged by all 12 migrations, proven by git diff --exit-code before and after the rail.'
  - 'Named type aliases stay named aliases via propType {kind:ref, to:<Alias>}; the lone inline union (Divider.orientation) authors {kind:enum}; the lone callback (Truncate.onExpandedChange) authors {kind:callback} — both lower byte-identically.'
  - 'styled members never carry propType; designed members author exactly one of type | propType; no member is dual-authored. All 12 components report migrated with a2uiStructuredSource=true.'
  - 'Truncate.onExpandedChange remains generated framework API but is omitted from the A2UI agent capability surface (carried via the expanded channel), per A2UI projection doctrine.'
acceptance:
  - id: A1
    given: 'The 12 Batch A components migrated from props.styled (legacy TS-string type) to props.designed with structured propType (V1 + V2 kinds)'
    when: 'pnpm run generate -- --target=all <12 components> is run'
    then: 'git diff --exit-code over the five generated src trees reports zero drift, and the prop-surface inventory reports all 12 as migrated (scoreboard migrated 1 -> 13).'
  - id: A2
    given: 'Divider (first real enum authoring) and Truncate (first real callback authoring)'
    when: 'The PropTypeIR + A2UI focused tests and governed:rail run'
    then: 'src/prop-type-ir.test.ts, a2ui/__tests__/prop-type-source.test.ts pass and governed:rail is overall:pass — proving the first end-to-end V2-authored component migrations the V2 infra spec could not.'
  - id: A3
    given: 'A generic emitter gap discovered mid-batch (Lit rendered callback propType as @property() instead of @property({attribute:false}))'
    when: 'The gap is encountered'
    then: 'Batch A stops and the fix is promoted to a shared codegen change (fix(codegen): Lit emitter reflects attribute:false for V2 callback propType) rather than patched in a single contract — preserving the authority split.'
  - id: A4
    given: 'The whole corpus after Batch A merges to main'
    when: 'governed:rail runs on main followed by the generated-tree git diff'
    then: 'The rail passes in required mode and the post-rail diff over all five generated src trees is clean.'
