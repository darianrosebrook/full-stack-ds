id: FIGMA-STATE-EFFECT-DESCRIPTOR-ENRICHMENT-01
title: 'State-surface effect facts: neutral effect/valueEffects on stateDimension; planner reads facts not category heuristics; sharper residuals; framework byte-equivalent'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-06-05T23:56:40.956Z'
updated_at: '2026-06-05T23:56:42.016Z'
blast_radius:
  modules:
    - '@full-stack-ds/ds-contracts (schema + 6 component contracts)'
    - '@full-stack-ds/codegen (contract types, figma descriptor projection)'
    - '@full-stack-ds/figma-plugin (planner reads effect facts)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/ds-contracts/component.contract.schema.json
    - packages/ds-contracts/components/**
    - packages/ds-codegen/src/contract.ts
    - packages/ds-codegen/src/frameworks/figma/descriptor.ts
    - packages/ds-codegen/src/frameworks/figma/factory.ts
    - packages/ds-codegen/src/**/*.test.ts
    - packages/ds-figma-plugin/src/planner.ts
    - packages/ds-figma-plugin/src/planner.test.ts
    - packages/ds-figma-plugin/src/materialize-state.test.ts
    - packages/ds-figma-plugin/src/generated/**
  out:
    - packages/ds-figma-plugin/src/materialize-state.ts
    - packages/ds-tokens/
invariants:
  - "The effect fact is a NEUTRAL state-surface concept (restyle | overlay | metadata | channel) on stateDimension — no target (Figma) language in contract authority. effect is dimension-level; valueEffects is value-level and overrides."
  - "The planner chooses boolean-property vs variant-axis vs channel-bound from effect facts, not from the availability/validation/selection category heuristic. The heuristic is removed for enriched dimensions."
  - "Planner residuals are sharper: a dimension with no effect fact yields an effect-missing residual; a dimension with mixed value effects reports the precise mixed set. No residual says 'category implies restyle' for an enriched dimension."
  - "Framework output (React/Vue/Svelte/Angular/Lit) stays byte-equivalent: effect is descriptor/planner authority, never framework behavior. The figma descriptors regenerate to carry effect (A3)."
acceptance:
  - id: A1
    given: "the component contract schema"
    when: "validated"
    then: "stateDimension accepts effect and valueEffects with the closed value set (restyle|overlay|metadata|channel), rejects invalid values, and keeps additionalProperties: false"
  - id: A2
    given: "the codegen contract types, normalizeStates, and figma descriptor types"
    when: "built"
    then: "they carry the effect facts without changing generated framework output"
  - id: A3
    given: "descriptor generation"
    when: "run for migrated dimensions"
    then: "effect data is emitted into the *.figma.json descriptors"
  - id: A4
    given: "Button, Checkbox, Switch, Tabs, Dialog, and Sheet"
    when: "authored"
    then: "each carries explicit effect facts sufficient to remove the planner's boolean-refused-restyle and mixed-channel-and-visual heuristics from those paths"
  - id: A5
    given: "the planner"
    when: "classifying dimensions"
    then: "it reads effect facts instead of category heuristics when choosing boolean-property vs variant-axis vs channel-bound"
  - id: A6
    given: "an unenriched or mixed dimension"
    when: "planned"
    then: "a missing effect fact yields an effect-missing residual; mixed value effects report the precise mixed set; enriched dimensions no longer carry category-implies-restyle residuals"
  - id: A7
    given: "existing planner and materializer tests"
    when: "run after enrichment"
    then: "they remain green, updated only where expected residuals improve"
  - id: A8
    given: "the five framework trees"
    when: "regenerated and diffed"
    then: "byte-equivalent — the effect fact does not change React/Vue/Svelte/Angular/Lit output"
  - id: A9
    given: "this slice's diff"
    when: "reviewed"
    then: "no live Figma materialization, no token-style resolution, no MCP/canvas work"
non_functional: {}
contracts:
  - name: 'state-effect-schema'
    type: schema
    path: 'packages/ds-contracts/component.contract.schema.json'
    description: "stateDimension carries neutral effect (restyle|overlay|metadata|channel) + value-level valueEffects; additionalProperties stays closed."
  - name: 'planner-reads-effect-facts'
    type: behavior
    path: 'packages/ds-figma-plugin/src/planner.ts'
    description: "Planner lowers from effect facts (not category heuristics); residuals become effect-missing / precise-mixed-set."
  - name: 'effect-residual-before-after'
    type: contract-test
    description: "Before/after planner residual fixtures for Button/Checkbox/Switch/Tabs/Dialog/Sheet showing heuristic residuals replaced by fact-driven lowerings + sharper residuals."
