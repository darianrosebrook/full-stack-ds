  - 'A generated aria-labelledby must never resolve to an element whose rendered content is empty when the gating prop/slot is absent.'
acceptance:
  - id: A1
    given: 'an IdRefAttrIR with exactly one ref carrying slotGate and no when/passthrough'
    when: 'the Lit emitter lowers it'
    then: 'the emitted attribute keeps the querySelector slot-presence guard (pinned by a codegen test that fails on the pre-fix collapse)'
  - id: A2
    given: 'a Toast with the title prop set'
    when: 'any web family renders it'
    then: 'the title part renders the title text (content: prop:title), so the generated aria-labelledby names a non-empty element'
  - id: A3
    given: 'a React Field re-render with unchanged slots/status'
    when: 'the field-association provider value is computed'
    then: 'the context value is referentially stable (useMemo), so consumers do not re-render on unrelated Field renders'
  - id: A4
    given: 'the current-implementation-snapshot claim ledger'
    when: 'read for a11y capabilities'
    then: 'it records the a11y-realization rail and the label/id-association lowering with their merge commits'
