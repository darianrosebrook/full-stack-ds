id: RAIL-A11Y-REALIZATION-01
title: 'A11y-realization rail: contract-derived accessibility obligations verified in committed generated output, family-neutral'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-07-22T21:48:55.220Z'
updated_at: '2026-07-22T21:48:56.792Z'
blast_radius:
  modules:
    - 'scripts/a11y-realization-audit (new rail: derive + verify + ledger)'
    - 'packages/ds-codegen/src/validation (only if a shared predicate must be exported; no behavior change)'
    - 'package.json + .github/workflows/ci.yml (audit script + CI gate step)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'scripts/a11y-realization-audit'
    - 'packages/ds-codegen/src/validation'
  out: []
  support:
    - package.json
    - .github/workflows/ci.yml
invariants:
  - 'Obligations are DERIVED from the live contract corpus on every run (relationships, a11y.keyboard, focus.strategy) — never a committed frozen classification.'
  - 'Realization is checked in COMMITTED generated output per admitted family, iterated from the AdmissionDescriptor registry — never a hardcoded web-only framework list; each family maps obligations to its own accessibility surface (web DOM attrs vs react-native accessibility props); a family without a defined mapping for an obligation class is an explicit documented exclusion, never a silent skip.'
  - 'The rail FAILS (nonzero exit) on any unrealized obligation not named in the committed known-gaps ledger; it ALSO fails when a ledger entry no longer reproduces (stale debt must be deleted) — the ledger can only shrink, so pre-existing debt is enumerable and burn-down is enforced, while NEW gaps can never be added silently.'
  - 'The rail is read-only over source: it classifies and reports; it never regenerates, never fixes, and writes only machine-local report artifacts plus the committed ledger check.'
  - 'Native realization classes are honored: a keyboard obligation satisfied by a native element (button/input/details) or by an imported behavior primitive (focus trap, dismissal) counts as realized — the rail must not demand redundant hand-wired handlers where the platform provides the behavior.'
acceptance:
  - id: A1
    given: 'the live contract corpus and committed generated output'
    when: 'the a11y rail runs'
    then: 'every contract relationships[] attribute, a11y.keyboard entry, and focus.strategy declaration yields a derived obligation with a per-family realization verdict (realized / unrealized / family-excluded-with-reason), and the run exits nonzero because unrealized obligations exist that are enumerated in the ledger only'
  - id: A2
    given: 'the committed known-gaps ledger enumerating the pre-existing debt'
    when: 'the rail runs on the current corpus'
    then: 'the rail exits ZERO (all unrealized obligations are ledgered), and the ledger entries each name the owning campaign spec'
  - id: A3
    given: 'a deliberately introduced new gap (a contract relationship attribute removed from generated output, or a ledger entry for an obligation that IS realized)'
    when: 'the rail runs'
    then: 'it exits nonzero in BOTH directions (new unledgered gap; stale ledger entry) — falsifiability proven by probe, then reverted'
  - id: A4
    given: 'CI'
    when: 'the gate job runs'
    then: 'an audit:a11y-realization step runs the rail after the governed rail + committed-bytes diff, in blocking mode'
non_functional: {}
contracts:
  - name: 'a11y-obligations'
    type: behavior
    path: 'scripts/a11y-realization-audit/audit.mjs'
