id: RUNTIME-RAIL-NONDEFAULT-PROPS-01
title: 'Runtime rail: non-default prop assertions for R/V/S/L via query-param overrideProps'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: rail-nondefault
created_at: '2026-06-03T00:08:09.776Z'
updated_at: '2026-06-03T00:08:18.449Z'
blast_radius:
  modules:
    - src/runtime (R/V/S/L preview plugins — query-param overrideProps) + e2e (runtime rail)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - e2e/runtime-rail.spec.ts
    - src/runtime/react-preview/vite-plugin.ts
    - src/runtime/vue-preview/vite-plugin.ts
    - src/runtime/svelte-preview/vite-plugin.ts
    - src/runtime/lit-preview/vite-plugin.ts
  out:
    - src/runtime/angular-compiler
    - src/runtime/shells
    - src/runtime/demos.ts
    - packages
invariants:
  - 'Mechanism is query-param -> the EXISTING overrideProps seam: each R/V/S/L preview plugin parses non-default props from the preview URL and threads them into the already-wired buildXDemo(component, overrideProps). No postMessage protocol is added; no demo-entry re-render rewrite; demos.ts is consumed unchanged (it is scope.out — the overrideProps argument already exists there).'
  - 'Cache-correctness: the props must reach the prop-carrying key, not just the shell. The preview entry virtual module is currently keyed by component name only (e.g. virtual:fsds-preview-react/<Name>), so two prop-sets would otherwise collide on one cached module. The override must be encoded into the entry id / load path (decoded in resolveId/load) so distinct prop-sets resolve to distinct entry source — a non-default URL must NOT serve the cached default-props render. This is asserted by the rail navigating default vs non-default and observing DIFFERENT facts.'
  - 'Angular is untouched by this spec: no Angular preview route, no Angular host re-synthesis, no addition of "angular" to the rail FRAMEWORKS array. src/runtime/angular-compiler and src/runtime/shells are scope.out. Angular non-default-prop rail inclusion is the adjacent follow-up RUNTIME-RAIL-ANGULAR-01.'
  - 'The stale Angular rail comment is corrected to the accurate INTERIM state: Angular preview is executable (live AOT preview landed in HARNESS-ANGULAR-PREVIEW-LIVE-BOOTSTRAP-01 @ f1d2a52; all corpus components render "ready"), but Angular is still excluded from THIS Playwright fact rail because it mounts via a compiled-host/srcDoc path rather than the navigable /preview/{fw}/{name} route R/V/S/L use — making it a navigable-route follow-up. The comment must stop describing Angular as an inert/non-executable preview, since the live AOT preview disproves that.'
  - 'Screenshots stay out of CI truth: this spec adds OS-agnostic fact assertions only; it does not add or depend on screenshot baselines, and the existing CI=true screenshot self-skip is preserved.'
  - 'The non-default assertions prove a CHANGED fact vs default, not merely presence: each new assertion pins a concrete non-default value (maxLines=7 / value=50 / lines=5) and the test demonstrates it differs from the default-props render — so a plugin that ignored the override (served the default) would FAIL.'
acceptance:
  - id: A1
    given: 'the React/Vue/Svelte/Lit preview plugins, whose parseShellRequest currently strips the query string (.split("?")[0]) and whose entry virtual id is keyed by component name only'
    when: 'a preview URL carries non-default props (e.g. /preview/react/ShowMore?maxLines=7)'
    then: 'the plugin parses the props, threads them into buildXDemo(component, overrideProps), and encodes them into the entry resolution so the mounted component reflects the override — not the cached default-props entry'
  - id: A2
    given: 'ShowMore mounted with maxLines=7 (default is 3)'
    when: 'the rail reads the inline style of .show-more__content across react/vue/svelte/lit'
    then: 'the assertion observes --fsds-show-more-content-max-lines: "7" (not "3"), proving the non-default prop drives the runtime CSS var; the existing default-props test (asserting "3") remains and still passes'
  - id: A3
    given: 'Progress mounted with value=50 (no default)'
    when: 'the rail reads the .progress__fill inline style and the [role="progressbar"] element across the four frameworks'
    then: 'it observes --fsds-progress-fill-width present with the value derived from 50 AND aria-valuenow="50" — two independent facts from one non-default prop, neither present at default'
  - id: A4
    given: 'Truncate mounted with lines=5 (no default)'
    when: 'the rail reads the .truncate__content inline style across the four frameworks'
    then: 'it observes --fsds-truncate-content-lines: "5" — upgrading the existing "not the string undefined" default assertion to an exact non-default value'
  - id: A5
    given: 'the runtime-rail.spec.ts header comment that currently describes Angular preview as inert/non-executable (the stale claim this spec corrects)'
    when: 'the comment is read after this spec'
    then: 'it states the accurate interim status (Angular preview executable; excluded from this rail pending a navigable route; follow-up RUNTIME-RAIL-ANGULAR-01) and the FRAMEWORKS array still contains only react/vue/svelte/lit (Angular not added here)'
  - id: A6
    given: 'the slice as committed and run'
    when: 'pnpm run e2e:rail executes and git diff is taken'
    then: 'the new non-default assertions pass for all four frameworks; only the four plugins + the rail spec changed (no angular-compiler, shells, demos.ts, or package file in the diff); no screenshot baseline is added and the CI=true screenshot skip is intact'
non_functional: {}
contracts:
  - name: 'nondefault-prop-rail'
    type: behavior
    path: 'e2e/runtime-rail.spec.ts'
