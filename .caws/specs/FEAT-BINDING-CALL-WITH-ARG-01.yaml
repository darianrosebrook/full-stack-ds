acceptance:
  - id: A1
    given: 'the BindingExpression grammar extended with a governed call-with-argument channel-setter form (payload from iteration locals or props, no arbitrary-expression escape hatch)'
    when: 'schema, IR, and all five emitters lower it'
    then: 'an event wire can invoke a channel setter with a per-item payload idiomatically in every framework, pinned by codegen unit tests per framework with falsification proof.'
  - id: A2
    given: 'Select options iterated over prop:options'
    when: 'an option click wire uses the new form'
    then: 'generated output calls setSelection with that options value and the previously orphaned setSelection is live in all five frameworks.'
  - id: A3
    given: 'Calendar day cells currently iterated as a bare count with no per-cell Date'
    when: 'the contract is upgraded so iteration yields real day values and day clicks use the new form'
    then: 'clicking a day updates the value channel with that days date, with visible-label wiring recorded as in or out of scope explicitly.'
  - id: A4
    given: 'OTP per-field entry needing set-char-at-index semantics'
    when: 'the new form (or an explicitly recorded successor) wires field input'
    then: 'typing in field N updates character N without overwriting the whole value, or the OTP portion is explicitly deferred with its blocker named.'
  - id: A5
    given: 'the full corpus regeneration and suites'
    when: 'run after the change'
    then: 'components not using the new form are byte-identical and all gates pass.'
