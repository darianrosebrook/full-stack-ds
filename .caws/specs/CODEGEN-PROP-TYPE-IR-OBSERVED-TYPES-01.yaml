id: CODEGEN-PROP-TYPE-IR-OBSERVED-TYPES-01
title: 'PropTypeIR V2 (observed-corpus extension): callback/array/union/literal/void/promise + enum quote fix'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: ptir-v2
created_at: '2026-06-05T08:25:28.756Z'
updated_at: '2026-06-05T08:25:28.756Z'
blast_radius:
  modules:
    - 'packages/ds-codegen/src (PropTypeIR vocabulary, canonicalTsType, normalizePropType, typeRefs, inventory)'
    - 'packages/ds-contracts/component.contract.schema.json (propType $defs)'
    - 'packages/ds-contracts/a2ui (callback omission from agent capability surface)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-codegen/src/**'
    - 'packages/ds-contracts/component.contract.schema.json'
    - 'packages/ds-contracts/a2ui/**'
  out: []
invariants:
  - 'V1 stays the closed pilot vocabulary in name; this spec adds PropTypeIR V2 (observed-corpus): callback, array, union, literal, void, promise. No inline anonymous-object kind — named object-ish aliases stay propType {kind:ref}; genuinely anonymous object types are declared residuals, not new IR kinds.'
  - 'Button-quality bar is unchanged: migrated still means no styled production dependency, every consumer prop authoring structured propType, resolved refs, A2UI deriving from structured source. V2 widens the vocabulary, it does not lower the bar.'
  - 'canonicalTsType lowers every V2 kind (and the enum quote fix) byte-identically to the existing generated TypeScript for every observed corpus example; proven by governed:rail + a clean post-rail five-tree git diff.'
  - 'styled/hook stay legacy type-only fallback (propType forbidden). designed/constrained author exactly one of type | propType. Schema admits V2 kinds only on designed/constrained propType.'
  - 'A2UI omits callback props from the agent capability surface unless the semantics are already owned by a channel/event; raw callback props are never exposed as agent-settable operations.'
  - 'The inventory can still distinguish fully-structured migrated components from fallback/residual components after V2 lands.'
acceptance:
  - id: A1
    given: 'A designed/constrained member authoring a V2 propType (callback/array/union/literal/void/promise) matching an observed corpus signature'
    when: 'canonicalTsType lowers it and the owning component is regenerated for all five frameworks'
    then: 'The emitted TypeScript byte-equals the prior generated string (git diff --exit-code clean over the five src trees), proving V2 is a faithful structured re-encoding.'
  - id: A2
    given: 'The enum propType kind (previously dead in generated output)'
    when: 'canonicalTsType lowers {kind:enum, values:[...]}'
    then: 'It emits a double-quoted union (e.g. "horizontal" | "vertical") matching the corpus generated-TS convention, covered by a unit test.'
  - id: A3
    given: 'A member whose type is a genuinely anonymous inline object (e.g. Field.validate context param) or otherwise outside observed V2 shapes'
    when: 'The corpus is inventoried'
    then: 'It normalizes to an explicit fallback/residual (never a silent clean kind), and the IR does not grow an unbounded TypeScript-AST object kind.'
  - id: A4
    given: 'A component with a callback prop that is the onChange of a declared channel (e.g. Truncate.onExpandedChange)'
    when: 'A2UI derives the descriptor'
    then: 'The callback prop is omitted from the agent-settable capability surface (routed via the channel/event semantics), and A2UI byte-output for already-correct cases is unchanged.'
  - id: A5
    given: 'The poison-string emitter tests'
    when: 'They are extended to callback/array/union propTypes'
    then: 'Each emitter is proven to lower from propType (ignoring a poisoned legacy type string), and governed:rail passes in required mode.'
non_functional: {}
contracts:
  - name: 'proptype-v2-schema'
    type: schema
    path: 'packages/ds-contracts/component.contract.schema.json'
