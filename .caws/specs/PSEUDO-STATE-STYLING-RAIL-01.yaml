blast_radius:
  modules:
    - 'New read-only classification rail under scripts/pseudo-state-audit/ (audit.mjs + locked discriminator test) + its report under docs/pseudo-state-audit/. Analogous to the variant-style audit but for STATE/PSEUDO obligations: it derives each component''s declared state obligations from contract states.dimensions (categories interaction/availability/selection/validation/visibility) plus the empty-input prompt pseudo-element, and checks whether the generated React CSS realizes each via the matching pseudo-class, ARIA-attribute, BEM-modifier, or :has() selector. It changes no contract, codegen, emitter, generated artifact, or visual style — it only classifies and reports gaps for later realization batches.'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'scripts/pseudo-state-audit/'
    - 'docs/pseudo-state-audit/'
  out: []
invariants:
  - 'The rail is read-only: it changes no contract, codegen source, emitter, generated artifact, or visual style. It only adds the audit script, its locked test, and the generated report under docs/.'
  - 'Each declared state obligation is classified against the generated React CSS using the SAME realization vocabulary the codegen emits (pseudo-class, ARIA-attribute, BEM-modifier, or :has() form); a realization in any of those forms counts, so the audit does not false-flag a state that is styled via a different-but-valid selector.'
  - 'False positives are suppressed: initial state values (base-covered), interaction dimensions with no authored styling intent, JS-driven disclosure channels, and focus.strategy=none roots are not reported as gaps.'
acceptance:
  - id: A1
    given: 'the 47-component contract corpus, each with a states.dimensions block'
    when: 'the new scripts/pseudo-state-audit/audit.mjs runs (read-only)'
    then: 'for every component it derives the declared state obligations from states.dimensions (categories interaction/availability/selection/validation/visibility) plus the empty-field input prompt pseudo-element for text inputs, excluding each dimension''s initial value'
  - id: A2
    given: 'a declared state value'
    when: 'the audit computes its expected realization'
    then: 'derivable states map to their pseudo/ARIA selector via the codegen''s DERIVABLE_STATE_TO_PSEUDO table (hover->:hover, focus->:focus-visible, disabled->:disabled, checked->:checked, expanded->[aria-expanded], selected->[aria-selected], pressed->[aria-pressed]); non-derivable states map to the BEM modifier .<prefix>--<value>'
  - id: A3
    given: 'the generated <Name>.css + <Name>.tokens.css'
    when: 'the audit detects realization'
    then: 'it counts the obligation realized if ANY valid form is present — the pseudo-class, the ARIA-attribute selector, the BEM modifier, or the :has(.<prefix>__input:<state>) wrapper used by input-backed components (Switch/Checkbox); initial values, unstyled interaction dims, channel-driven disclosure, and focus.strategy=none are not flagged'
  - id: A4
    given: 'the classification'
    when: 'the audit writes its report'
    then: 'docs/pseudo-state-audit/pseudo-state-matrix.{json,md} is produced, listing per component each obligation as realized / gap / behavioral, and surfacing the real gaps (the input prompt pseudo-element is never emitted; Tabs/Select realize open/selected via a BEM modifier while the ARIA truth is aria-expanded/aria-selected; Dialog emits no interaction-state CSS)'
  - id: A5
    given: 'the audit classification'
    when: 'a locked discriminator test runs'
    then: 'it pins known-REALIZED obligations (Button :hover/:focus-visible/:disabled; Checkbox checked+disabled via :has) and known GAPS (the input prompt pseudo-element on a text input), and a false-positive control (an initial/base value and a focus.strategy=none root are not flagged)'
  - id: A6
    given: 'the rail'
    when: 'the gates run'
    then: 'generate:check stays 47/47 (unchanged — no contract/codegen edits); the locked test passes; git diff is confined to scripts/pseudo-state-audit/ + docs/pseudo-state-audit/'
