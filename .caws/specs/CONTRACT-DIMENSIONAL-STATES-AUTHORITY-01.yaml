invariants:
  - "When present, states is an object with a dimensions map only. The flat string[] authoring branch is removed from the schema and the contract types; no component contract authors a flat states array."
  - "Dimensional state is the authoring authority; the flattened flat selector list exists only as a downstream-derived projection in normalizeStates, never as an accepted authoring form."
  - "Generated framework output (React/Vue/Svelte/Angular/Lit) is byte-equivalent before and after the migration unless a deliberate, documented semantic change is included. normalizeStates derives the same flat selector keys the legacy arrays produced (hover/focus/disabled/checked), not dimension defaults (rest/enabled/unchecked)."
  - "Cross-dimension suppression is the only new composition relation; cardinality derives from values.length and inter-dimension stacking is structural — neither is added as an authored field."
acceptance:
  - id: A1
    given: "a contract authoring states as a flat string[]"
    when: "it is validated against the component contract schema"
    then: "validation REJECTS it (the array branch no longer exists)"
  - id: A2
    given: "a contract authoring states.dimensions with category, suppresses, a11y value mapping, and value-level derivesFrom"
    when: "it is validated against the schema"
    then: "validation ACCEPTS it and the typed fields round-trip into the IR"
  - id: A3
    given: "the full component corpus"
    when: "scanned for flat states arrays"
    then: "zero remain — every contract that had states is now dimensional"
  - id: A4
    given: "a dimensional contract whose values include hover/focus/disabled/checked"
    when: "normalizeStates runs"
    then: "the derived flat list contains the same selector keys the legacy flat array produced (not rest/enabled/unchecked), proven by unit test"
  - id: A5
    given: "the migrated corpus"
    when: "governed:rail regenerates all five framework trees and git diff --exit-code runs over them"
    then: "no output drift — generated bytes are unchanged (or any change is deliberate and documented in the spec)"
  - id: A6
    given: "Checkbox, Switch, and Button"
    when: "their migrated contracts are inspected"
    then: "they prove the hard cases — pointer/focus dimension split (hover+focus stack), suppressive availability (disabled masks interaction affordance), selection dimension, and value-aware a11y (aria-checked mixed/true/false)"
  - id: A7
    given: "this slice"
    when: "its diff is reviewed"
    then: "no Figma materializer, Figma component-property, or token-resolution change is present (those are explicitly out of scope)"
non_functional: {}
contracts:
  - name: 'dimensional-states-schema'
    type: schema
    path: 'packages/ds-contracts/component.contract.schema.json'
    description: "states is object-only ({dimensions}); stateDimension carries category, cross-dimension suppresses, value-aware a11y, and value-level derivesFrom. Flat-array branch removed."
  - name: 'normalize-states-flat-projection'
    type: behavior
    path: 'packages/ds-codegen/src/contract.ts'
    description: "normalizeStates treats dimensional state as authoritative and derives the same flat selector keys the legacy arrays produced; dimensions is non-nullable when states are present."
  - name: 'generated-output-byte-equivalence'
    type: contract-test
    description: "governed:rail regenerate-all + git diff --exit-code proves no framework output drift across React/Vue/Svelte/Angular/Lit after the corpus migration."
