invariants:
  - Design-system components and styles are imported ONLY from public
    `@full-stack-ds/react` exports (`@full-stack-ds/react`,
    `@full-stack-ds/react/styles.css`) — never from dist/, generated internals,
    packages/ds-react/src, or any non-exported path.
  - The dashboard consumes domain data ONLY through the app-local API boundary
    (`../../src/api`); it never imports fixtures or `../../src/data/adapter`.
  - The data/API seam (`examples/operations-dashboard/src/{types,data,api}`) is
    not modified by this slice — only consumed.
  - Local CSS covers unclaimed page-frame layout only (shell/columns/grid/sticky/
    responsive); any place it would have to substitute for package-owned
    behavior, state indication, density, focus, overlay, or styling is recorded
    as a finding instead.
acceptance:
  - id: A1
    given: the new React example package under examples/operations-dashboard/react
    when: 'its build script runs (pnpm --filter <pkg> run build)'
    then: Vite builds the app with no errors and no casts past the public types.
  - id: A2
    given: the package declares a typecheck script (tsc --noEmit)
    when: 'pnpm --filter <pkg> run typecheck runs'
    then: it passes with zero type errors against the public @full-stack-ds/react
      types and the app-local API types.
  - id: A3
    given: the React lane consumes the already-landed data/API seam
    when: 'pnpm run test:examples:data-api runs after this slice'
    then: it still reports 47 passing tests — the seam is unchanged.
  - id: A4
    given: the lane source under examples/operations-dashboard/react/src
    when: grepped for forbidden import substrings (dist, packages/ds-react/src,
      generated, fixtures, src/data/adapter)
    then: none are present — components come from public exports and data comes
      from the app-local API boundary only.
  - id: A5
    given: the operations-dashboard spec required regions and state behaviors
    when: the React app is rendered
    then: it implements the header summary band, filter rail, incident queue,
      selected-detail pane, timeline region, assign workflow, resolve confirm
      dialog, and toast/alert feedback, with loading / list / selected /
      filtered / empty / load-failure+retry / assign-pending / resolve-pending
      states driven off the promise-returning API.
