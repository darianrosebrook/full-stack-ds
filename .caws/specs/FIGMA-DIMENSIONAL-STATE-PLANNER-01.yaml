invariants:
  - "The planner is a pure function: generated descriptor in, normalized Figma component-surface plan out. No Figma API calls, no canvas mutation, no component-property writes, no layer creation, no side effects."
  - "boolean-vs-variant classification derives from dimension values.length and category, never from state names. 2 values -> boolean-ish property candidate (only if representable without restyle ambiguity); >=3 -> variant-axis candidate."
  - "Suppression is represented as a cross-dimension relation in the plan (availability=disabled suppresses interaction affordances) — never a layer deletion, and never applied to semantic dimensions (selection / openness / loading / validation)."
  - "Pointer and focus remain separate dimensions, so hover+focus is representable while hover+active is mutually exclusive within pointer. a11y is retained as plan metadata, not visual behavior."
acceptance:
  - id: A1
    given: "a generated Figma descriptor carrying dimensional states.dimensions"
    when: "the planner runs"
    then: "it emits a stable, deterministic normalized component-surface plan (same input -> same plan)"
  - id: A2
    given: "a descriptor whose interaction states are split into pointer and focus dimensions"
    when: "the planner classifies them"
    then: "hover+focus is representable (separate axes) while hover and active are mutually exclusive within the pointer axis"
  - id: A3
    given: "an availability dimension with suppresses.categories including interaction"
    when: "the planner runs"
    then: "the plan records a cross-dimension suppression relation (availability=disabled masks interaction affordances) and does NOT suppress selection/openness/loading/validation, and does NOT delete layers"
  - id: A4
    given: "dimensions of varying cardinality and category"
    when: "the planner classifies each"
    then: "boolean-vs-variant routing is decided by values.length and category, with zero branching on state-value names"
  - id: A5
    given: "a 2-value dimension whose active value implies a restyle rather than a visibility toggle"
    when: "the planner runs"
    then: "it refuses the boolean-property lowering and emits an explicit residual instead of an unsound boolean-property plan"
  - id: A6
    given: "the proven migration edge cases"
    when: "the planner runs against their descriptors"
    then: "Button, Checkbox/Switch, Dialog/Sheet, and Tabs each have a per-component plan fixture asserting their classification + residuals"
  - id: A7
    given: "this slice's diff"
    when: "it is reviewed"
    then: "no canvas output changes are present — only planner data and tests (no plugin.ts/materializer, component-property API, token resolution, or layer creation)"
non_functional: {}
contracts:
  - name: 'figma-state-plan'
    type: behavior
    path: 'packages/ds-figma-plugin/src/planner.ts'
    description: "Pure planner mapping descriptor dimensional-state facts to a target-neutral Figma realization plan (boolean/variant/interaction-axis candidates, suppression relations, a11y metadata, residuals)."
  - name: 'per-component-plan-fixtures'
    type: contract-test
    description: "Deterministic per-component plan fixtures for Button/Checkbox/Switch/Dialog/Sheet/Tabs, with explicit residuals for states that cannot yet be faithfully lowered into Figma component properties."
