id: FEAT-MOBILE-DISCLOSURE-001
title: 'Native disclosure collapse intent for Details'
risk_tier: 2
mode: feature
lifecycle_state: active
worktree: mobile-disclosure
created_at: '2026-06-02T02:19:28.205Z'
updated_at: '2026-06-02T02:52:46.609Z'
blast_radius:
  modules:
    - packages/ds-codegen (collapse-intent collection in framework-neutral IR)
    - packages/ds-contracts/components/Details (intent authoring site)
    - packages/ds-codegen/src/frameworks/swift (native disclosure proof path)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/ds-codegen/src/ir.ts'
    - 'packages/ds-contracts/components/Details/Details.contract.json'
    - 'packages/ds-codegen/src/frameworks/swift/swiftui/component-source.ts'
    - packages/ds-codegen/src/contract.ts
    - packages/ds-contracts/component.contract.schema.json
    - packages/ds-codegen/src/collapse-intent.test.ts
  out:
    # Explicitly NOT this spec — successor specs / out-of-scope (Phase 1, rail).
    - 'packages/ds-codegen/src/target-packs'
    - 'packages/ds-codegen/src/validation'
    - 'packages/ds-codegen/src/frameworks/jetpack-compose'
    - 'packages/ds-codegen/src/frameworks/react-native'
    - 'packages/ds-contracts/components/ShowMore'
    - 'packages/ds-contracts/components/Accordion'
    - 'packages/ds-contracts/components/Tabs'
    - 'packages/ds-contracts/components/Table'
    - 'packages/ds-contracts/components/Card'
    - 'packages/ds-contracts/components/Postcard'
    - 'packages/ds-contracts/components/Field'
    - 'packages/ds-contracts/components/OTP'
    - 'packages/ds-contracts/components/Shuttle'
    - 'packages/ds-contracts/components/Breadcrumbs'
    - 'packages/ds-contracts/components/NavList'
    - 'packages/ds-contracts/components/Alert'
    - 'packages/ds-contracts/components/AlertNotice'
invariants:
  - 'Details exposes an explicit `native-disclosure` collapse intent through the governed contract/anatomy path (collapsibleTo on the appropriate part); no emitter infers the intent from the component name.'
  - 'The existing collapse-intent collector (today handling `native-toggle-affordance`) generalizes to admit `native-disclosure` without hardcoding Details-specific lore — it branches on the declared intent value, not the component identity.'
  - 'The already-proven Switch / `native-toggle-affordance` path is unchanged; adding a second intent does not regress the first.'
  - 'Web framework generated output (React/Vue/Svelte/Angular/Lit) is byte-stable across this change; any diff is proven generated/no-op and justified. Preferred outcome: empty web output diff.'
  # Non-claims (scope fences — successor specs own these):
  - 'NON-CLAIM: does not complete final mobile rendering of Details — proves the disclosure-intent data path is available, not pixel/behavior-complete native output.'
  - 'NON-CLAIM: does not make any mobile target rail-admissible (no TargetId widening / target-pack / rail plan — successor FEAT-MOBILE-SWIFTUI-001).'
  - 'NON-CLAIM: does not solve Native View IR layout for category-C composite components (successor Phase 1 layout specs).'
  - 'NON-CLAIM: does not implement ShowMore partial collapse (C2) or any Accordion/Tabs/Table/Card/Postcard/Field/OTP/Shuttle/Breadcrumbs/NavList/Alert(Notice) disposition from TRIAGE-01.'
  - 'NON-CLAIM: does not touch the Compose or React Native emitters, the admission rail, or the target-pack registry.'
  - 'NON-CLAIM: does not modify or reopen the closed FEAT-MOBILE-IR-001 (typed token facts) — it is a consumed, completed dependency.'
acceptance:
  - id: A1
    given: 'the Details contract is built into ComponentIR through the governed contract/anatomy path'
    when: 'a consumer collects collapse intents from the IR'
    then: 'Details carries an explicit `native-disclosure` collapse intent declared in the contract (collapsibleTo), and no code infers it from the component name "Details"'
  - id: A2
    given: 'the collapse-intent collector that today admits only `native-toggle-affordance`'
    when: 'the `native-disclosure` intent is introduced'
    then: 'the collector admits `native-disclosure` by branching on the declared intent value — a test proves the generalization with no Details-specific or component-name lore added to the collector'
  - id: A3
    given: 'Details with the native-disclosure intent declared and the typed token facts from FEAT-MOBILE-IR-001 available'
    when: 'a native-facing IR/projection test reads Details'
    then: 'Details carries enough typed information for a disclosure primitive — summary/trigger part, collapsible content part, and the open/close state channel — while the test asserts only data availability and explicitly does NOT assert final mobile rendering'
  - id: A4
    given: 'the Switch component and its proven `native-toggle-affordance` path'
    when: 'the native-disclosure intent is added to the collector and corpus'
    then: 'Switch still collects `native-toggle-affordance` and its existing native-toggle behavior/tests remain green — no regression to the already-proven affordance path'
  - id: A5
    given: 'the full corpus is regenerated for all five web targets'
    when: 'git diff is taken over the five generated web src trees'
    then: 'the diff is empty (preferred), or any diff is explicitly proven to be generated/no-op and justified in evidence — collapse intents are non-web facts and must not alter web output'
  - id: A6
    given: 'the C2/C3 components from TRIAGE-01 (ShowMore, Accordion, Tabs, Table, Card, Postcard, Field, OTP, Shuttle, Breadcrumbs, NavList, Alert, AlertNotice)'
    when: 'this spec is implemented'
    then: 'none of them gain a collapsibleTo intent or any native realization here — they remain successor/out-of-scope, verified by their absence from the change set'
non_functional: {}
contracts:
  - type: schema
    name: 'native-disclosure collapse intent'
    description: >-
      A second member of the collapse-intent vocabulary (alongside
      `native-toggle-affordance`), declared on a Details anatomy part via
      `collapsibleTo` and surfaced by the IR's collapse-intent collector.
      It signals that Details collapses to a single native disclosure
      primitive (SwiftUI DisclosureGroup, Android expandable) that holds
      both the summary/trigger and the collapsible content — the cleanest
      C1 candidate from MOBILE-COLLAPSE-INTENT-TRIAGE-01 (commit 7fee739).
      The collector must branch on the declared intent value, never on the
      component name. Consumes (does not modify) the typed token facts from
      the closed FEAT-MOBILE-IR-001 (commit eb933df). Corpus role: Details
      is the proof of the new intent vocabulary, not a launch point for the
      mobile rail. Evidence inputs: docs/successor-work-mobile-collapse-triage.md
      (7fee739), docs/successor-work-mobile-rail-sweep.md (8c19a4d).
  - type: contract-test
    name: 'native-disclosure availability for a native consumer (Details), Switch non-regression'
    description: >-
      A native-facing test proves Details exposes the native-disclosure
      intent plus the typed parts a disclosure primitive needs
      (summary/trigger, collapsible content, open-state channel), WITHOUT
      completing the SwiftUI emitter or asserting final rendering — data
      availability only. A companion assertion proves Switch's
      native-toggle-affordance path is unchanged (A4), and a corpus
      regeneration check proves the five web src trees are byte-stable (A5).
